<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruption Desk - Airline Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-sky-500 selection:text-white text-xs">

    <div x-data="{
        searchQuery: '',
        selectedAirline: null,
        isAdminMode: false,
        adminPasswordInput: '',
        isEditing: false,
        viewMode: 'agent', 
        currentLang: 'en',
        activePolicy: 'pure_skchg', 
        airlines: [],

        zuluInput: '12:00',
        get estOutput() {
            if(!this.zuluInput) return '--:-- --';
            try {
                const parts = this.zuluInput.split(':');
                if(parts.length !== 2) return '--:-- --';
                let hours = parseInt(parts[0], 10);
                const minutes = parts[1];
                if(isNaN(hours) || hours < 0 || hours > 23) return '--:-- --';
                
                let estHours = hours - 5;
                if (estHours < 0) estHours += 24;
                const ampm = estHours >= 12 ? 'PM' : 'AM';
                
                estHours = estHours % 12;
                if (estHours === 0) estHours = 12; 
                
                return String(estHours).padStart(2, '0') + ':' + minutes + ' ' + ampm;
            } catch(e) { return '--:-- --'; }
        },

        newCustomLabel: '',
        newCustomValue: '',
        newCustomStatus: true,
        targetColumnType: 'skchg', 
        targetConditionType: 'normal', 

        i18n: {
            en: {
                title: 'DISRUPTION DESK',
                subtitle: 'Airline Policy Reference Hub',
                searchLabel: 'Search Fleet Index',
                searchPlaceholder: 'Carrier, IATA, ICAO...',
                indexLabel: 'Airlines Index',
                paxView: 'PASSENGER VIEW',
                agentView: 'AGENT VIEW',
                tabPureSkchg: '🔄 Pure Airline: Schedule Change',
                tabPureName: '📝 Pure Airline: Name Correction',
                tabOalSkchg: '✈️ OAL Policy: Schedule Change',
                tabOalName: '⌨️ OAL Policy: Name Correction',
                docSectionHeader: 'OFFICIAL CARRIER DOCUMENT VAULT',
                webLinkLabel: 'Official Web Policy Portal',
                pdfLinkLabel: 'Download Reference Guidelines (PDF)',
                noLinksText: 'No verified external attachments uploaded for this carrier.',
                noSelection: 'No Carrier Selection Detected'
            },
            ar: {
                title: 'مكتب الاضطرابات',
                subtitle: 'مركز مرجع السياسات لشركات الطيران',
                searchLabel: 'البحث في مؤشر الأسطول',
                searchPlaceholder: 'الناقل، إياتا، إيكاو...',
                indexLabel: 'مؤشر تقسيم الشركات',
                paxView: 'عرض المسافر',
                agentView: 'عرض الوكيل',
                tabPureSkchg: '🔄 تغيير الجدول: الشركة الأساسية',
                tabPureName: '📝 تصحيح الاسم: الشركة الأساسية',
                tabOalSkchg: '✈️ تغيير الجدول: الشركات الأخرى',
                tabOalName: '⌨️ تصحيح الاسم: الشركات الأخرى',
                docSectionHeader: 'OFFICIAL CARRIER DOCUMENT VAULT',
                webLinkLabel: 'بوابة السياسات الإلكترونية الرسمية',
                pdfLinkLabel: 'تحميل الدليل الإرشادي (PDF)',
                noLinksText: 'لا توجد مرفقات خارجية تم التحقق منها لهذا الناقل.',
                noSelection: 'لم يتم رصد اختيار شركة الطيران'
            },
            fr: {
                title: 'BUREAU DES PERTURBATIONS',
                subtitle: 'Centre de Référence des Politiques de Vol',
                searchLabel: 'Rechercher un Vol',
                searchPlaceholder: 'Compagnie, IATA, ICAO...',
                indexLabel: 'Index des Compagnies',
                paxView: 'VUE PASSAGER',
                agentView: 'VUE AGENT',
                tabPureSkchg: '🔄 Modification: Ligne Pure',
                tabPureName: '📝 Correction: Ligne Pure',
                tabOalSkchg: '✈️ Modification: Partenaire OAL',
                tabOalName: '⌨️ Correction: Partenaire OAL',
                docSectionHeader: 'OFFICIAL CARRIER DOCUMENT VAULT',
                webLinkLabel: 'Portail Officiel des Directives Web',
                pdfLinkLabel: 'Télécharger les Lignes Directrices (PDF)',
                noLinksText: 'Aucune pièce jointe externe vérifiée pour ce transporteur.',
                noSelection: 'Aucune Compagnie Sélectionnée Détectée'
            }
        },

        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-29',
            policyWebLink: '', policyPdfLink: '',
            threshold: '', travelWindow: '', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
            pureSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
            pureName: { fields: [] },
            oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
            oalName: { fields: [] }
        },

        isInternalField(label) {
            if (!label) return false;
            const lowerLabel = label.toLowerCase();
            return lowerLabel.includes('gds') || lowerLabel.includes('command') || lowerLabel.includes('osi') || lowerLabel.includes('tour code') || lowerLabel.includes('contact') || lowerLabel.includes('email') || lowerLabel.includes('phone') || lowerLabel.includes('infrastructure') || lowerLabel.includes('technical') || lowerLabel.includes('reissue / swap') || lowerLabel.includes('workaround');
        },

        init() {
            const localSavedData = localStorage.getItem('disruption_desk_fleet_data');
            if(localSavedData) {
                try {
                    this.airlines = JSON.parse(localSavedData);
                    this.selectedAirline = this.airlines[0];
                    return;
                } catch(e) { console.error('Local storage parse error.'); }
            }

            this.airlines = [
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '🇨🇦', lastUpdated: '2026-06-29',
                    policyWebLink: 'https://www.aircanada.com/agency', policyPdfLink: '',
                    threshold: '180', travelWindow: '-/+30', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pureSkchg: {
                        normalSkchg: [
                            { label: 'MINOR SC', value: 'less than 120 MIN', allowed: true },
                            { label: 'MAJOR CHANGE', value: 'more than 120 min', allowed: true },
                            { label: 'CABIN MATCHING RULES', value: 'Strict Cabin Balance Required.', allowed: false }
                        ],
                        iropSkchg: [],
                        normalRefund: [],
                        iropRefund: []
                    },
                    pureName: { fields: [] },
                    oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
                    oalName: { fields: [] }
                },
                {
                    airlineName: 'WestJet Airlines', iata: 'WS', icao: 'WJA', logo: '🍁', lastUpdated: '2026-06-26',
                    policyWebLink: 'https://www.westjet.com/en-ca/travel-agents', policyPdfLink: '',
                    threshold: '181 minutes', travelWindow: '+/-2 days original dates', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pureSkchg: {
                        normalSkchg: [
                            { label: 'MINOR CHANGE PROFILE', value: 'Less than 181 minutes time gap layout change.', allowed: true },
                            { label: 'CABIN MATCHING RULES', value: 'Same Cabin Balance Required.', allowed: false },
                            { label: 'INVENTORY FALLBACK TARGET', value: 'Next highest up to Y (Eco) / W (Prem) / J (Biz).', allowed: true },
                            { label: 'GEO AIRPORT ALLOWANCE MAP', value: 'Within 320 km / 200 miles (e.g. YVR/YXX)', allowed: true }
                        ],
                        iropSkchg: [
                            { label: 'SIGNIFICANT CHANGE TRIGGER', value: '181 minutes or structural cancellation.', allowed: true },
                            { label: 'POLICY IF MAIN AIRLINE CAUSES CHANGE', value: 'Full automated reissue allowed on WestJet flights into identical cabins matching original routing loops.', allowed: true },
                            { label: 'SKCHG CONTACT PHONE', value: '+1 877 664 3205', allowed: true }
                        ],
                        normalRefund: [
                            { label: 'BOOKING CLASS (RBD) RULES', value: 'Lowest Class Allowed Fallback inside cabin.', allowed: true },
                            { label: 'INVOLUNTARY ADMIN PENALTIES', value: 'None for involuntary profiles.', allowed: true },
                            { label: 'GDS OSI / TOUR CODE BOX', value: 'None Specified', allowed: true }
                        ],
                        iropRefund: [
                            { label: 'MAJOR CHANGE PROFILE', value: '181 minutes or more (3+ Hours) time variation change.', allowed: true },
                            { label: 'ENDORSEMENT BOX WAIVER TEXT', value: 'SKCHG', allowed: true },
                            { label: 'INVOLUNTARY CANCEL REFUND', value: 'Full Refund Authorized', allowed: true },
                            { label: 'GDS CASH REFUND WAIVER CODE', value: 'Q21SKDRF22', allowed: true },
                            { label: 'SKCHG CONTACT EMAIL', value: 'agencysalessupport@westjet.com', allowed: true }
                        ]
                    },
                    pureName: { fields: [ { label: 'Self-Service Typo Tolerance Threshold', value: 'First or middle name up to 3 chars.', allowed: true } ] },
                    oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
                    oalName: { fields: [] }
                }
            ];
            this.selectedAirline = this.airlines[0];
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
        },
        verifyAdmin() {
            if(this.adminPasswordInput === 'admin123') { this.isAdminMode = true; this.adminPasswordInput = ''; } else { alert('Access Denied'); }
        },
        addCustomField(pillar) {
            if(!this.newCustomLabel) return alert('Please enter a Field Title Name');
            
            const targetPillarKey = pillar === 'pure_skchg' ? 'pureSkchg' : pillar === 'pure_name' ? 'pureName' : pillar === 'oal_skchg' ? 'oalSkchg' : 'oalName';
            if(!this.formAirline[targetPillarKey]) {
                if(pillar.includes('name')) { this.formAirline[targetPillarKey] = { fields: [] }; }
                else { this.formAirline[targetPillarKey] = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }; }
            }

            if(pillar.includes('skchg')) {
                const arrayKey = this.targetConditionType + (this.targetColumnType === 'skchg' ? 'Skchg' : 'Refund');
                if(!this.formAirline[targetPillarKey][arrayKey]) this.formAirline[targetPillarKey][arrayKey] = [];
                this.formAirline[targetPillarKey][arrayKey].push({
                    label: this.newCustomLabel, value: this.newCustomValue, allowed: this.newCustomStatus
                });
            } else {
                if(!this.formAirline[targetPillarKey].fields) this.formAirline[targetPillarKey].fields = [];
                this.formAirline[targetPillarKey].fields.push({
                    label: this.newCustomLabel, value: this.newCustomValue, allowed: this.newCustomStatus
                });
            }
            this.newCustomLabel = ''; this.newCustomValue = ''; this.newCustomStatus = true;
        },
        removeCustomField(pillar, subType, idx) {
            const targetPillarKey = pillar === 'pure_skchg' ? 'pureSkchg' : pillar === 'pure_name' ? 'pureName' : pillar === 'oal_skchg' ? 'oalSkchg' : 'oalName';
            if(pillar.includes('skchg')) {
                this.formAirline[targetPillarKey][subType].splice(idx, 1);
            } else {
                this.formAirline[targetPillarKey].fields.splice(idx, 1);
            }
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline Name and IATA Code are required.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            
            const targetObj = JSON.parse(JSON.stringify(this.formAirline));
            if(!targetObj.pureSkchg) targetObj.pureSkchg = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] };
            if(!targetObj.pureName) targetObj.pureName = { fields: [] };
            if(!targetObj.oalSkchg) targetObj.oalSkchg = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] };
            if(!targetObj.oalName) targetObj.oalName = { fields: [] };

            const idx = this.airlines.findIndex(a => a.iata === targetObj.iata);
            if(idx !== -1) {
                this.airlines[idx] = targetObj;
            } else {
                this.airlines.push(targetObj);
            }
            
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
            this.selectedAirline = this.airlines.find(a => a.iata === targetObj.iata);
            this.isEditing = false; this.isAdminMode = false; this.resetForm();
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            if(!this.formAirline.pureSkchg) this.formAirline.pureSkchg = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] };
            if(!this.formAirline.pureName) this.formAirline.pureName = { fields: [] };
            if(!this.formAirline.oalSkchg) this.formAirline.oalSkchg = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] };
            if(!this.formAirline.oalName) this.formAirline.oalName = { fields: [] };
            this.isEditing = true; this.isAdminMode = true;
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-29', policyWebLink: '', policyPdfLink: '',
                threshold: '', travelWindow: '', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                pureSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }, pureName: { fields: [] }, oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }, oalName: { fields: [] }
            };
            this.isEditing = false;
        }
    }" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased text-xs">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">DISRUPTION DESK</h1>
                    <p class="text-xs text-slate-400 font-medium">Airline Policy Reference Hub</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="bg-slate-950 border border-slate-800 rounded-lg p-1 flex space-x-1">
                    <button @click="currentLang = 'en'" :class="currentLang === 'en' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">EN</button>
                    <button @click="currentLang = 'ar'" :class="currentLang === 'ar' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">AR</button>
                    <button @click="currentLang = 'fr'" :class="currentLang === 'fr' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">FR</button>
                </div>

                <div class="flex items-center bg-slate-900 border border-slate-800 p-0.5 rounded-lg">
                    <button @click="viewMode = 'customer'" :class="viewMode === 'customer' ? 'bg-sky-600 text-white font-bold' : 'text-slate-400 hover:text-white'" class="px-3 py-1 rounded text-[10px] uppercase transition">PASSENGER VIEW</button>
                    <button @click="viewMode = 'agent'" :class="viewMode === 'agent' ? 'bg-indigo-600 text-white font-bold' : 'text-slate-400 hover:text-white'" class="px-3 py-1 rounded text-[10px] uppercase transition">AGENT VIEW</button>
                </div>

                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-2 py-1 rounded text-white w-20 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-2 py-1 rounded ml-1 transition">Auth</button>
                </div>
                <template x-if="isAdminMode">
                    <button @click="isAdminMode = false; resetForm()" class="text-[10px] font-bold border border-slate-700 bg-slate-800 hover:bg-rose-600 text-white px-2.5 py-1 rounded transition uppercase">Lock</button>
                </template>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gradient-to-br from-slate-900 to-indigo-950/40 border border-slate-800 p-5 rounded-xl shadow-xl space-y-3">
                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-2"><span class="text-base">🕰️</span><h4 class="text-xs font-bold uppercase tracking-wider text-slate-300">Zulu Time Converter</h4></div>
                    <div class="space-y-2">
                        <input type="time" x-model="zuluInput" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white font-mono text-sm focus:outline-none" />
                        <div class="bg-slate-950/80 border border-slate-800 p-2.5 rounded-lg flex justify-between items-center">
                            <span class="text-[10px] uppercase text-slate-400 font-semibold">EST Equivalent:</span><span class="text-xs font-bold font-mono text-sky-400" x-text="estOutput"></span>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Search Fleet Index</label>
                        <input type="text" placeholder="Carrier, IATA, ICAO..." x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Airlines Index (<span x-text="filteredAirlines.length"></span>)</span>
                        <button x-show="isAdminMode" @click="resetForm(); isEditing=false;" class="bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold px-2 py-0.5 rounded text-[10px] uppercase tracking-wider transition">New +</button>
                    </div>
                    <div class="space-y-1.5 max-h-[250px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center transition">
                                    <div class="flex items-center space-x-3"><span x-text="airline.logo"></span><span class="font-semibold" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode"><button @click="editAirline(airline)" class="p-2 bg-slate-900 border border-slate-800 rounded text-amber-400 hover:bg-amber-600 text-white transition">✏️</button></template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl grid grid-cols-2 md:grid-cols-4 gap-1.5">
                    <button @click="activePolicy = 'pure_skchg'" :class="activePolicy === 'pure_skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold" x-text="i18n[currentLang].tabPureSkchg"></button>
                    <button @click="activePolicy = 'pure_name'" :class="activePolicy === 'pure_name' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold" x-text="i18n[currentLang].tabPureName"></button>
                    <button @click="activePolicy = 'oal_skchg'" :class="activePolicy === 'oal_skchg' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold" x-text="i18n[currentLang].tabOalSkchg"></button>
                    <button @click="activePolicy = 'oal_name'" :class="activePolicy === 'oal_name' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold" x-text="i18n[currentLang].tabOalName"></button>
                </div>

                <div x-show="isAdminMode" class="bg-[#0b1329] border border-slate-800 rounded-xl p-6 shadow-2xl space-y-6">
                    <span class="text-xs font-bold text-amber-400 uppercase tracking-widest block">ADMIN PROFILE MANAGEMENT CONTROL PANEL</span>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div><label class="block text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" placeholder="AA" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-amber-400 mb-1">SKD Trigger Override</label><input type="text" x-model="formAirline.threshold" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-sky-400 mb-1">Window Metric Override</label><input type="text" x-model="formAirline.travelWindow" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs pt-2">
                        <div><label class="block text-emerald-400 mb-1">OAL Rebooking [ALLOWED/PROHIBITED]</label><input type="text" x-model="formAirline.oalRebookingVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-emerald-400 mb-1">Refund Eligibility [YES/NO]</label><input type="text" x-model="formAirline.refundEligVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Official Web Portal URL</label><input type="url" x-model="formAirline.policyWebLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Downloadable Reference PDF URL</label><input type="url" x-model="formAirline.policyPdfLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                    </div>

                    <div class="bg-[#070b19] p-4 rounded-xl border border-slate-800 space-y-4">
                        <div class="bg-slate-900 p-4 border border-dashed border-slate-700 rounded-lg grid grid-cols-1 md:grid-cols-2 gap-4">
                            <template x-if="activePolicy.includes('skchg')">
                                <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label class="block font-semibold mb-1">1. Choose Metric Domain Column</label>
                                        <select x-model="targetColumnType" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white">
                                            <option value="skchg">Schedule Change Framework</option>
                                            <option value="refund">Refund Protocols</option>
                                        </select>
                                    </div>
                                    <div><label class="block font-semibold mb-1">2. Choose Policy Matrix Severity</label>
                                        <select x-model="targetConditionType" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white">
                                            <option value="normal">Normal Policy Profile</option>
                                            <option value="irop">IROPS Emergency Policy Profile</option>
                                        </select>
                                    </div>
                                </div>
                            </template>
                            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-2 pt-2">
                                <input type="text" x-model="newCustomLabel" placeholder="Field Row Title..." class="bg-slate-950 p-2 border border-slate-800 rounded text-white text-xs" />
                                <input type="text" x-model="newCustomValue" placeholder="Field Rules Content Guidelines..." class="bg-slate-950 p-2 border border-slate-800 rounded text-white text-xs md:col-span-2" />
                            </div>
                            <button type="button" @click="addCustomField(activePolicy)" class="md:col-span-2 w-full py-2 bg-indigo-600 hover:bg-indigo-500 font-bold uppercase rounded text-xs transition">Inject Field Slot Node</button>
                        </div>

                        <div class="space-y-4 max-h-[350px] overflow-y-auto">
                            <template x-if="activePolicy.includes('skchg')">
                                <div class="space-y-2">
                                    <template x-for="subType in ['normalSkchg', 'iropSkchg', 'normalRefund', 'iropRefund']">
                                        <div class="p-2 border border-slate-800 rounded bg-slate-950/60 mt-1">
                                            <span class="text-[10px] font-bold text-amber-500 block uppercase mb-1" x-text="subType.replace('Skchg',' Column (Change Framework)').replace('Refund',' Column (Refund Protocols)')"></span>
                                            <template x-for="(field, index) in formAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : 'oalSkchg']?.[subType]" :key="index">
                                                <div class="flex items-center gap-2 mt-1">
                                                    <input type="text" x-model="field.label" class="bg-slate-900 border border-slate-700 p-1 rounded font-bold text-white w-1/3" />
                                                    <input type="text" x-model="field.value" class="bg-slate-900 border border-slate-700 p-1 rounded text-slate-300 flex-1" />
                                                    <button type="button" @click="field.allowed = !field.allowed" :class="field.allowed ? 'bg-emerald-600' : 'bg-rose-600'" class="px-2 py-1 rounded text-[9px]" x-text="field.allowed ? 'YES' : 'NO'"></button>
                                                    <button type="button" @click="removeCustomField(activePolicy, subType, index)" class="text-rose-500 font-bold px-1 text-xs">🗑️</button>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template x-if="!activePolicy.includes('skchg')">
                                <div class="p-2 border border-slate-800 rounded bg-slate-950/60 mt-1">
                                    <span class="text-[10px] font-bold text-purple-400 block uppercase mb-1">Name Correction Rows Studio</span>
                                    <template x-for="(field, index) in formAirline[activePolicy === 'pure_name' ? 'pureName' : 'oalName']?.fields" :key="index">
                                        <div class="flex items-center gap-2 mt-1">
                                            <input type="text" x-model="field.label" class="bg-slate-900 border border-slate-700 p-1 rounded font-bold text-white w-1/3" />
                                            <input type="text" x-model="field.value" class="bg-slate-900 border border-slate-700 p-1 rounded text-slate-300 flex-1" />
                                            <button type="button" @click="field.allowed = !field.allowed" :class="field.allowed ? 'bg-emerald-600' : 'bg-rose-600'" class="px-2 py-1 rounded text-[9px]" x-text="field.allowed ? 'YES' : 'NO'"></button>
                                            <button type="button" @click="removeCustomField(activePolicy, 'fields', index)" class="text-rose-500 font-bold px-1 text-xs">🗑️</button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase rounded-lg shadow-lg tracking-wider">Commit & Save Complete Airline Profile Object</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            
                            <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                <div class="flex items-center space-x-2 border-b border-slate-800 pb-2">
                                    <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest" x-text="i18n[currentLang].docSectionHeader"></h3>
                                </div>
                                <div class="flex flex-wrap gap-4 text-xs font-semibold">
                                    <template x-if="selectedAirline.policyWebLink">
                                        <a :href="selectedAirline.policyWebLink" target="_blank" class="flex items-center space-x-2 bg-slate-950 hover:bg-sky-950 border border-slate-700/60 hover:border-sky-500 text-slate-300 hover:text-sky-400 px-4 py-3 rounded-lg transition shadow-md">
                                            <span>🔗</span> <span x-text="i18n[currentLang].webLinkLabel"></span>
                                        </a>
                                    </template>
                                    <template x-if="selectedAirline.policyPdfLink">
                                        <a :href="selectedAirline.policyPdfLink" target="_blank" download class="flex items-center space-x-2 bg-slate-950 hover:bg-emerald-950 border border-slate-700/60 hover:border-emerald-500 text-slate-300 hover:text-emerald-400 px-4 py-3 rounded-lg transition shadow-md">
                                            <span>📥</span> <span x-text="i18n[currentLang].pdfLinkLabel"></span>
                                        </a>
                                    </template>
                                    <template x-if="!selectedAirline.policyWebLink && !selectedAirline.policyPdfLink">
                                        <p class="text-slate-500 italic py-1" x-text="i18n[currentLang].noLinksText"></p>
                                    </template>
                                </div>
                            </div>

                            <template x-if="activePolicy.includes('skchg')">
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fadeIn">
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">SKD CHG TRIGGER</span>
                                        <span class="text-xs font-bold text-amber-500 mt-1 block" x-text="selectedAirline.threshold || 'N/A'"></span>
                                    </div>
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">TRAVEL WINDOW</span>
                                        <span class="text-xs font-bold text-sky-400 mt-1 block" x-text="selectedAirline.travelWindow || 'N/A'"></span>
                                    </div>
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">OAL REBOOKING</span>
                                        <span class="text-xs font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.oalRebookingVal"></span>
                                    </div>
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">REFUND ELIGIBILITY</span>
                                        <span class="text-xs font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.refundEligVal"></span>
                                    </div>
                                </div>
                            </template>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3">
                                        <span class="text-lg">📋</span>
                                        <h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="activePolicy.includes('skchg') ? 'SCHEDULE CHANGE FRAMEWORK' : 'NAME CORRECTION RULES'"></h3>
                                    </div>

                                    <div class="space-y-4 text-xs">
                                        <template x-if="activePolicy.includes('skchg')">
                                            <div class="space-y-4">
                                                <span class="text-[10px] font-bold text-indigo-400 tracking-widest uppercase block bg-slate-950 p-1 border-l-2 border-indigo-500">Normal Policy Ruleset</span>
                                                <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : 'oalSkchg']?.normalSkchg" :key="'live-skchg-'+index">
                                                    <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                        <div class="flex justify-between items-center mb-1">
                                                            <span class="text-slate-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                            <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                        </div>
                                                        <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                                    </div>
                                                </template>
                                                
                                                <span class="text-[10px] font-bold text-amber-500 tracking-widest uppercase block bg-slate-950 p-1 border-l-2 border-amber-500 pt-2">IROPS Disruption Policy Ruleset</span>
                                                <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : 'oalSkchg']?.iropSkchg" :key="'live-skchg-irop-'+index">
                                                    <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                        <div class="flex justify-between items-center mb-1">
                                                            <span class="text-slate-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                            <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                        </div>
                                                        <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <template x-if="!activePolicy.includes('skchg')">
                                            <div class="space-y-4">
                                                <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_name' ? 'pureName' : 'oalName']?.fields" :key="'live-name-l-'+index">
                                                    <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                        <div class="flex justify-between items-center mb-1">
                                                            <span class="text-slate-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                            <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                        </div>
                                                        <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3">
                                        <span class="text-lg">⚙️</span>
                                        <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">REFUND PROTOCOLS</h3>
                                    </div>

                                    <div class="space-y-4 text-xs">
                                        <template x-if="activePolicy.includes('skchg')">
                                            <div class="space-y-4">
                                                <span class="text-[10px] font-bold text-indigo-400 tracking-widest uppercase block bg-slate-950 p-1 border-l-2 border-indigo-500">Normal Refund Protocols</span>
                                                <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : 'oalSkchg']?.refundFields" :key="'live-refund-'+index">
                                                    <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                        <div class="flex justify-between items-center mb-1">
                                                            <span class="text-emerald-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                            <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                        </div>
                                                        <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                                    </div>
                                                </template>
                                                
                                                <span class="text-[10px] font-bold text-amber-500 tracking-widest uppercase block bg-slate-950 p-1 border-l-2 border-amber-500 pt-2">IROPS Disruption Refund Protocols</span>
                                                <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : 'oalSkchg']?.iropRefund" :key="'live-refund-irop-'+index">
                                                    <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                        <div class="flex justify-between items-center mb-1">
                                                            <span class="text-emerald-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                            <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                        </div>
                                                        <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <template x-if="!activePolicy.includes('skchg')">
                                            <div class="space-y-4">
                                                <p class="text-slate-500 italic text-center py-4">Workstation layout commands, rules, and system formats are synced directly under the Primary targets panel view matrix.</p>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </template>
                    <template x-if="!selectedAirline">
                        <div class="bg-slate-900 border border-slate-800 p-12 text-center rounded-xl font-medium text-slate-500 uppercase tracking-widest shadow-inner">No Airline Selected</div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
