        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        },
        verifyAdmin() {
            if(this.adminPasswordInput === 'admin123') {
                this.isAdminMode = true;
                this.adminPasswordInput = '';
            } else { alert('Access Denied'); }
        },
        addCustomField(pillar) {
            if(!this.newCustomLabel) return alert('Please enter a Field Title Name');
            const targetPillarKey = pillar === 'pure_skchg' ? 'pureSkchg' : pillar === 'pure_name' ? 'pureName' : pillar === 'oal_skchg' ? 'oalSkchg' : 'oalName';
            this.formAirline[targetPillarKey].fields.push({
                label: this.newCustomLabel,
                value: this.newCustomValue,
                allowed: this.newCustomStatus
            });
            this.newCustomLabel = ''; this.newCustomValue = ''; this.newCustomStatus = true;
        },
        removeCustomField(pillar, idx) {
            const targetPillarKey = pillar === 'pure_skchg' ? 'pureSkchg' : pillar === 'pure_name' ? 'pureName' : pillar === 'oal_skchg' ? 'oalSkchg' : 'oalName';
            this.formAirline[targetPillarKey].fields.splice(idx, 1);
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline data incomplete.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            const idx = this.airlines.findIndex(a => a.iata === this.formAirline.iata);
            if(idx !== -1) {
                this.airlines[idx] = JSON.parse(JSON.stringify(this.formAirline));
            } else {
                this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            }
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.isEditing = false; this.isAdminMode = false;
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            this.isEditing = true;
            this.isAdminMode = true;
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-29', policyWebLink: '', policyPdfLink: '',
                threshold: '', travelWindow: '', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                pureSkchg: { fields: [] }, pureName: { fields: [] }, oalSkchg: { fields: [] }, oalName: { fields: [] }
            };
            this.isEditing = false;
        }
    }" :dir="currentLang === 'ar' ? 'rtl' : 'ltr'" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased text-xs">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent" x-text="i18n[currentLang].title"></h1>
                    <p class="text-xs text-slate-400 font-medium" x-text="i18n[currentLang].subtitle"></p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="bg-slate-950 border border-slate-800 rounded-lg p-1 flex space-x-1">
                    <button @click="currentLang = 'en'" :class="currentLang === 'en' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">EN</button>
                    <button @click="currentLang = 'ar'" :class="currentLang === 'ar' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">AR</button>
                    <button @click="currentLang = 'fr'" :class="currentLang === 'fr' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">FR</button>
                </div>

                <div class="flex items-center bg-slate-900 border border-slate-800 p-0.5 rounded-lg">
                    <button @click="viewMode = 'customer'" :class="viewMode === 'customer' ? 'bg-sky-600 text-white font-bold' : 'text-slate-400 hover:text-white'" class="px-3 py-1 rounded text-[10px] uppercase transition" x-text="i18n[currentLang].paxView"></button>
                    <button @click="viewMode = 'agent'" :class="viewMode === 'agent' ? 'bg-indigo-600 text-white font-bold' : 'text-slate-400 hover:text-white'" class="px-3 py-1 rounded text-[10px] uppercase transition" x-text="i18n[currentLang].agentView"></button>
                </div>

                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-2 py-1 rounded text-white w-20 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-2 py-1 rounded ml-1 transition">Auth</button>
                </div>
                <template x-if="isAdminMode">
                    <button @click="isAdminMode = false; resetForm()" class="text-[10px] font-bold border border-slate-700 bg-slate-800 hover:bg-rose-600 text-white px-2.5 py-1 rounded transition uppercase">Lock</button>
                </template>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2" x-text="i18n[currentLang].searchLabel"></label>
                        <input type="text" :placeholder="i18n[currentLang].searchPlaceholder" x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider"><span x-text="i18n[currentLang].indexLabel"></span> (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="w-full text-left p-3 rounded-lg flex justify-between items-center transition">
                                    <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode">
                                    <button @click="editAirline(airline)" class="p-2 bg-slate-900 hover:bg-amber-600 border border-slate-800 rounded text-xs text-amber-400 hover:text-white transition">✏️</button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl grid grid-cols-2 md:grid-cols-4 gap-1.5">
                    <button @click="activePolicy = 'pure_skchg'" :class="activePolicy === 'pure_skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabPureSkchg"></button>
                    <button @click="activePolicy = 'pure_name'" :class="activePolicy === 'pure_name' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabPureName"></button>
                    <button @click="activePolicy = 'oal_skchg'" :class="activePolicy === 'oal_skchg' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabOalSkchg"></button>
                    <button @click="activePolicy = 'oal_name'" :class="activePolicy === 'oal_name' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabOalName"></button>
                </div>

                <div x-show="isAdminMode" class="bg-[#0b1329] border border-slate-800 rounded-xl p-6 shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <h3 class="text-sm font-bold text-amber-400 tracking-wider uppercase">INJECT NEW FLEET POLICY RULESET</h3>
                        <button @click="resetForm()" class="bg-slate-800 text-xs px-2.5 py-1 rounded text-slate-300">Clear Form</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs">
                        <div><label class="block text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-amber-400 mb-1">SKD CHG Trigger Metric</label><input type="text" x-model="formAirline.threshold" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-sky-400 mb-1">Travel Window Metric</label><input type="text" x-model="formAirline.travelWindow" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs pt-2">
                        <div><label class="block text-emerald-400 mb-1">OAL Rebooking [ALLOWED/PROHIBITED]</label><input type="text" x-model="formAirline.oalRebookingVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-emerald-400 mb-1">Refund Eligibility [YES/NO]</label><input type="text" x-model="formAirline.refundEligVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Official Web Portal URL</label><input type="url" x-model="formAirline.policyWebLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Downloadable Reference PDF URL</label><input type="url" x-model="formAirline.policyPdfLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                    </div>

                    <div class="bg-[#070b19] p-4 rounded-xl border border-slate-800 space-y-4">
                        
                        <div class="p-3 bg-slate-950 border border-dashed border-slate-800 rounded-lg grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                            <div><label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">New Custom Field Title</label><input type="text" x-model="newCustomLabel" placeholder="e.g. EXTRA FIELD LABEL" class="w-full bg-[#070b19] border border-slate-800 p-1.5 rounded text-white" /></div>
                            <div class="md:col-span-2"><label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Guideline Policy Descriptions Content</label><input type="text" x-model="newCustomValue" placeholder="Description content string goes here..." class="w-full bg-[#070b19] border border-slate-800 p-1.5 rounded text-white" /></div>
                            <div>
                                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Validation Seal Stamp</label>
                                <div class="flex border border-slate-800 rounded overflow-hidden p-0.5 bg-[#070b19]">
                                    <button type="button" @click="newCustomStatus = true" :class="newCustomStatus ? 'bg-emerald-600 font-bold' : 'text-slate-500'" class="flex-1 py-1 rounded text-[9px]">✅ ALLOW</button>
                                    <button type="button" @click="newCustomStatus = false" :class="!newCustomStatus ? 'bg-rose-600 font-bold' : 'text-slate-500'" class="flex-1 py-1 rounded text-[9px]">❌ PROHIB</button>
                                </div>
                            </div>
                            <button type="button" @click="addCustomField(activePolicy)" class="md:col-span-4 w-full py-2 bg-indigo-600 hover:bg-indigo-500 font-bold uppercase rounded text-[10px] transition">➕ Inject Variable Node Row Field Into Dynamic View</button>
                        </div>

                        <div class="space-y-2 max-h-[400px] overflow-y-auto pr-1">
                            <template x-for="(field, index) in formAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : activePolicy === 'pure_name' ? 'pureName' : activePolicy === 'oal_skchg' ? 'oalSkchg' : 'oalName'].fields" :key="index">
                                <div class="bg-[#0b1329] border border-slate-800 p-2 rounded-lg flex flex-col md:flex-row items-start md:items-center gap-3 text-xs shadow-md">
                                    <div class="w-full md:w-1/3">
                                        <label class="block text-[9px] uppercase text-slate-500 mb-0.5">Field Variable Name (Changeable / Dynamic)</label>
                                        <input type="text" x-model="field.label" class="w-full bg-slate-950 border border-slate-800 p-1.5 rounded font-bold text-sky-400" />
                                    </div>
                                    <div class="flex-1 w-full">
                                        <label class="block text-[10px] uppercase text-slate-500 mb-0.5">Policy Content Guidelines Description</label>
                                        <textarea x-model="field.value" class="w-full bg-slate-950 border border-slate-800 p-1.5 rounded text-slate-200" rows="1"></textarea>
                                    </div>
                                    <div class="w-full md:w-auto flex items-center space-x-3 pt-3 md:pt-0">
                                        <div class="flex bg-slate-950 border border-slate-800 p-0.5 rounded">
                                            <button type="button" @click="field.allowed = true" :class="field.allowed ? 'bg-emerald-600 text-white font-bold' : 'text-slate-500'" class="px-2 py-1 rounded text-[9px]">✅</button>
                                            <button type="button" @click="field.allowed = false" :class="!field.allowed ? 'bg-rose-600 text-white font-bold' : 'text-slate-500'" class="px-2 py-1 rounded text-[9px]">❌</button>
                                        </div>
                                        <button type="button" @click="removeCustomField(activePolicy, index)" class="text-rose-500 hover:text-rose-400 bg-rose-500/10 p-2 rounded border border-rose-500/20 font-bold transition">🗑️ Delete</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase text-xs tracking-wider rounded-lg shadow-lg hover:from-amber-400 hover:to-orange-500 transition">Save Complete Fleet Profile Object</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            
                            <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                <div class="flex items-center space-x-2 border-b border-slate-800 pb-2">
                                    <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest" x-text="i18n[currentLang].docSectionHeader"></h3>
                                </div>
                                <div class="flex flex-wrap gap-4 text-xs font-semibold">
                                    <template x-if="selectedAirline.policyWebLink">
                                        <a :href="selectedAirline.policyWebLink" target="_blank" class="flex items-center space-x-2 bg-slate-950 hover:bg-sky-950 border border-slate-700/60 hover:border-sky-500 text-slate-300 hover:text-sky-400 px-4 py-3 rounded-lg transition shadow-md">
                                            <span>🔗</span> <span x-text="i18n[currentLang].webLinkLabel"></span>
                                        </a>
                                    </template>
                                    <template x-if="selectedAirline.policyPdfLink">
                                        <a :href="selectedAirline.policyPdfLink" target="_blank" download class="flex items-center space-x-2 bg-slate-950 hover:bg-emerald-950 border border-slate-700/60 hover:border-emerald-500 text-slate-300 hover:text-emerald-400 px-4 py-3 rounded-lg transition shadow-md">
                                            <span>📥</span> <span x-text="i18n[currentLang].pdfLinkLabel"></span>
                                        </a>
                                    </template>
                                </div>
                            </div>

                            <template x-if="activePolicy === 'pure_skchg' || activePolicy === 'oal_skchg'">
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fadeIn">
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">SKD CHG TRIGGER</span>
                                        <span class="text-xs font-bold text-amber-500 mt-1 block" x-text="selectedAirline.threshold || 'N/A'"></span>
                                    </div>
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">TRAVEL WINDOW</span>
                                        <span class="text-xs font-bold text-sky-400 mt-1 block" x-text="selectedAirline.travelWindow || 'N/A'"></span>
                                    </div>
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">OAL REBOOKING</span>
                                        <span class="text-xs font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.oalRebookingVal"></span>
                                    </div>
                                    <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center shadow-md">
                                        <span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">REFUND ELIGIBILITY</span>
                                        <span class="text-xs font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.refundEligVal"></span>
                                    </div>
                                </div>
                            </template>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3">
                                        <span class="text-lg">📋</span>
                                        <h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="activePolicy.includes('skchg') ? 'SCHEDULE CHANGE FRAMEWORK' : 'NAME CORRECTION RULES'"></h3>
                                    </div>

                                    <div class="space-y-4 text-xs">
                                        <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : activePolicy === 'pure_name' ? 'pureName' : activePolicy === 'oal_skchg' ? 'oalSkchg' : 'oalName']?.fields?.filter((_, i) => i % 2 === 0)" :key="'disp-left-'+index">
                                            <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                <div class="flex justify-between items-center mb-1">
                                                    <span class="text-slate-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                    <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                </div>
                                                <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3">
                                        <span class="text-lg">⚙️</span>
                                        <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="activePolicy.includes('skchg') ? 'REFUND PROTOCOLS' : 'GDS COMMANDS & REISSUE'"></h3>
                                    </div>

                                    <div class="space-y-4 text-xs">
                                        <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : activePolicy === 'pure_name' ? 'pureName' : activePolicy === 'oal_skchg' ? 'oalSkchg' : 'oalName']?.fields?.filter((_, i) => i % 2 !== 0)" :key="'disp-right-'+index">
                                            <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2.5 animate-fadeIn">
                                                <div class="flex justify-between items-center mb-1">
                                                    <span class="text-slate-400 font-bold uppercase text-[10px]" x-text="field.label"></span>
                                                    <span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10 border border-emerald-500/20' : 'text-rose-500 bg-rose-500/10 border border-rose-500/20'" class="text-[9px] px-1.5 rounded font-mono font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span>
                                                </div>
                                                <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
