        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-27',
            scheduleChange: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: true, sameBookingClass: true, lowestAvailableClass: '', oalAllowed: false, ticketReissue: true, waiverRequired: false, endorsementCode: '', geoAllowance: '' },
            refundPolicy: { refundAllowed: false, refundThreshold: '', cancellationRefund: false, majorScheduleChangeRefund: false, penalty: 'None', waiverRequired: false, refundWaiverCode: '', osiTourCode: '' },
            nameCorrection: { typoAllowance: '', legalChange: '', passportMatch: true, penaltyFee: '', gdsCommand: '', osiString: '' }
        },

        init() {
            this.airlines = [
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '✈️', lastUpdated: '2026-06-26',
                    scheduleChange: { minorChange: 'Less than 60 minutes', majorChange: '60 minutes or more', threshold: '60 minutes', travelWindow: '+/-7 days', sameCabin: true, sameBookingClass: true, lowestAvailableClass: 'Same RBD Preferred', oalAllowed: false, ticketReissue: true, waiverRequired: true, endorsementCode: 'ACSKCHG', geoAllowance: 'Involuntary Reroute Rules Only' },
                    refundPolicy: { refundAllowed: true, refundThreshold: '120 minutes', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'None', waiverRequired: true, refundWaiverCode: 'ACREFUNDS', osiTourCode: 'OS AC INVOL SKCHG' },

                {
                    airlineName: 'Delta Air Lines', iata: 'DL', icao: 'DAL', logo: '📐', lastUpdated: '2026-06-20',
                    scheduleChange: { minorChange: 'Less than 60 minutes', majorChange: '60 minutes or more', threshold: '60 minutes', travelWindow: '+/-2 days', sameCabin: true, sameBookingClass: true, lowestAvailableClass: 'Main Cabin Lowest', oalAllowed: true, ticketReissue: true, waiverRequired: false, endorsementCode: 'SKCHG DL', geoAllowance: 'Co-terminal options permitted' },
                    refundPolicy: { refundAllowed: true, refundThreshold: '180 minutes', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'None', waiverRequired: false, refundWaiverCode: 'DL INVOL REF', osiTourCode: 'OS DL SKCHG' },
                    nameCorrection: { typoAllowance: 'Up to 3 characters in first/last name', legalChange: 'Allowed with official decree documents', passportMatch: true, penaltyFee: '$150 USD Admin Fee for major swaps', gdsCommand: 'OSI DL NAME CORRECTION SEC', osiString: 'OS DL REISSUE TYPO CORR' }
                },
                {
                    airlineName: 'WestJet Airlines', iata: 'WS', icao: 'WJA', logo: '🍁', lastUpdated: '2026-06-26',
                    scheduleChange: { minorChange: 'Less than 181 minutes', majorChange: '181 minutes or more (3+ Hours)', threshold: '181 minutes', travelWindow: '+/-2 days', sameCabin: true, sameBookingClass: false, lowestAvailableClass: 'Next highest up to Y (Eco) / W (Prem) / J (Biz)', oalAllowed: true, ticketReissue: true, waiverRequired: true, endorsementCode: 'SKCHG', geoAllowance: 'Within 320 km / 200 miles (e.g. YVR/YXX)' },
                    refundPolicy: { refundAllowed: true, refundThreshold: '181 minutes', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'Taxes L8/DO non-refundable for PUJ/POP/AZS/LRM', waiverRequired: true, refundWaiverCode: 'Q21SKDRF22', osiTourCode: 'None Specified' },
                    nameCorrection: { typoAllowance: 'First or middle name up to 3 chars', legalChange: 'Marriage/Divorce certificates accepted', passportMatch: true, penaltyFee: 'UltraBasic excluded, others free for typos', gdsCommand: 'CHNE/GDS SWAP PERMITTED', osiString: 'OS WS TYPO CORR' }
                }
            ];
            this.selectedAirline = this.airlines[1]; 
        },
        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        },
        verifyAdmin() {
            if(this.adminPasswordInput === 'admin123') {
                this.isAdminMode = true;
                this.adminPasswordInput = '';
            } else { alert('Access Denied: Incorrect Security Token'); }
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-27',
                scheduleChange: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: true, sameBookingClass: true, lowestAvailableClass: '', oalAllowed: false, ticketReissue: true, waiverRequired: false, endorsementCode: '', geoAllowance: '' },
                refundPolicy: { refundAllowed: false, refundThreshold: '', cancellationRefund: false, majorScheduleChangeRefund: false, penalty: 'None', waiverRequired: false, refundWaiverCode: '', osiTourCode: '' },
                nameCorrection: { typoAllowance: '', legalChange: '', passportMatch: true, penaltyFee: '', gdsCommand: '', osiString: '' }
            };
            this.isEditing = false;
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline Name and IATA Code are required.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            if(this.formAirline.icao) this.formAirline.icao = this.formAirline.icao.toUpperCase();
            
            this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.resetForm();
        }
    }" :dir="currentLang === 'ar' ? 'rtl' : 'ltr'" class="min-h-screen flex flex-col bg-slate-950 text-slate-100">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent" x-text="i18n[currentLang].title"></h1>
                    <p class="text-xs text-slate-400 font-medium" x-text="i18n[currentLang].subtitle"></p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="bg-slate-950 border border-slate-800 rounded-lg p-1 flex space-x-1">
                    <button @click="currentLang = 'en'" :class="currentLang === 'en' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">EN</button>
                    <button @click="currentLang = 'ar'" :class="currentLang === 'ar' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">AR</button>
                    <button @click="currentLang = 'fr'" :class="currentLang === 'fr' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">FR</button>
                </div>

                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-2 py-1 rounded text-white w-20 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-2 py-1 rounded ml-1 transition">Auth</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2" x-text="i18n[currentLang].searchLabel"></label>
                        <input type="text" :placeholder="i18n[currentLang].searchPlaceholder" x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white placeholder-slate-500 transition text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider"><span x-text="i18n[currentLang].indexLabel"></span> (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="w-full text-left p-3 rounded-lg flex justify-between items-center transition">
                                <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl flex space-x-2">
                    <button @click="activePolicy = 'skchg'" :class="activePolicy === 'skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-md font-bold' : 'text-slate-400 hover:text-slate-200'" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition" x-text="i18n[currentLang].tabSkchg"></button>
                    <button @click="activePolicy = 'namecorr'" :class="activePolicy === 'namecorr' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-md font-bold' : 'text-slate-400 hover:text-slate-200'" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition" x-text="i18n[currentLang].tabNameCorr"></button>
                </div>

                <div x-show="isAdminMode" class="bg-slate-900 border-2 border-amber-500/20 rounded-xl p-6 shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <h3 class="font-bold text-sm text-amber-400 uppercase tracking-wider">Inject New Fleet Policy Ruleset</h3>
                        <button @click="resetForm()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white px-3 py-1 rounded">Clear Form</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs">
                        <div><label class="block font-semibold text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" placeholder="e.g. Air India" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" placeholder="e.g. AI" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">ICAO Code</label><input type="text" x-model="formAirline.icao" placeholder="e.g. AIC" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">Emoji Logo</label><input type="text" x-model="formAirline.logo" placeholder="✈️" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white text-center" /></div>
                    </div>

                    <div class="border-t border-slate-800/80 pt-4 space-y-4">
                        <h4 class="text-xs font-bold text-sky-400 uppercase tracking-widest">1. Schedule Change Parameters</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                            <div><label class="block font-semibold text-slate-400 mb-1">Minor Change Profile</label><input type="text" x-model="formAirline.scheduleChange.minorChange" placeholder="e.g. Less than 60 mins" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Major Change Profile</label><input type="text" x-model="formAirline.scheduleChange.majorChange" placeholder="e.g. 60 mins or more" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Threshold Trigger</label><input type="text" x-model="formAirline.scheduleChange.threshold" placeholder="e.g. 60 minutes" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Travel Window</label><input type="text" x-model="formAirline.scheduleChange.travelWindow" placeholder="e.g. +/-7 days" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Fallback Class Target</label><input type="text" x-model="formAirline.scheduleChange.lowestAvailableClass" placeholder="e.g. Same RBD preferred" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Endorsement Waiver Text</label><input type="text" x-model="formAirline.scheduleChange.endorsementCode" placeholder="e.g. SKCHG DL" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div class="md:col-span-3"><label class="block font-semibold text-slate-400 mb-1">Geo Allowance Map</label><input type="text" x-model="formAirline.scheduleChange.geoAllowance" placeholder="e.g. Co-terminal options permitted" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-xs pt-1">
                            <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.sameCabin" class="rounded bg-slate-950 text-sky-500 border-slate-700" /><span>Same Cabin Mandatory</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.sameBookingClass" class="rounded bg-slate-950 text-sky-500 border-slate-700" /><span>Exact RBD Match Mandatory</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.oalAllowed" class="rounded bg-slate-950 text-sky-500 border-slate-700" /><span>OAL Rebooking Allowed</span></label>
                        </div>
                    </div>

                    <div class="border-t border-slate-800/80 pt-4 space-y-4">
                        <h4 class="text-xs font-bold text-emerald-400 uppercase tracking-widest">2. Refund Protocols & Waiver Codes</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                            <div><label class="block font-semibold text-slate-400 mb-1">Refund Change Threshold</label><input type="text" x-model="formAirline.refundPolicy.refundThreshold" placeholder="e.g. 120 minutes" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Involuntary Admin Penalties</label><input type="text" x-model="formAirline.refundPolicy.penalty" placeholder="e.g. None" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">GDS Refund Waiver Code</label><input type="text" x-model="formAirline.refundPolicy.refundWaiverCode" placeholder="e.g. ACREFUNDS" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div class="md:col-span-3"><label class="block font-semibold text-emerald-400 mb-1">GDS OSI / Tour Code Box Line Command</label><input type="text" x-model="formAirline.refundPolicy.osiTourCode" placeholder="e.g. OS AC INVOL SKCHG" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-xs pt-1">
                            <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.refundAllowed" class="rounded bg-slate-950 text-emerald-500 border-slate-700" /><span>Involuntary Refund Allowed</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.cancellationRefund" class="rounded bg-slate-950 text-emerald-500 border-slate-700" /><span>Flight Cancellation Protected</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.majorScheduleChangeRefund" class="rounded bg-slate-950 text-emerald-500 border-slate-700" /><span>Major Change Protected</span></label>
                        </div>
                    </div>

                    <div class="border-t border-slate-800/80 pt-4 space-y-4">
                        <h4 class="text-xs font-bold text-purple-400 uppercase tracking-widest">3. Name Correction Parameters</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                            <div><label class="block font-semibold text-slate-400 mb-1">Minor Typo Allowance</label><input type="text" x-model="formAirline.nameCorrection.typoAllowance" placeholder="e.g. Up to 3 characters free" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Legal / Marriage Changes</label><input type="text" x-model="formAirline.nameCorrection.legalChange" placeholder="e.g. Permitted with certificate" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Change Penalties / Fees</label><input type="text" x-model="formAirline.nameCorrection.penaltyFee" placeholder="e.g. Free for minor typos, otherwise $50" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">GDS Reissue Command</label><input type="text" x-model="formAirline.nameCorrection.gdsCommand" placeholder="e.g. CHNH/LASTNAME/FIRSTNAME" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div class="md:col-span-2"><label class="block font-semibold text-slate-400 mb-1">OSI Formatting String</label><input type="text" x-model="formAirline.nameCorrection.osiString" placeholder="e.g. OS AI NAME CORRECTION" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        </div>
                    </div>

                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase text-xs tracking-wider rounded-lg shadow-lg hover:from-amber-400 hover:to-orange-500 transition">Save Complete Policy Object to System Index</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            
                            <div class="bg-gradient-to-r from-slate-900 via-slate-900 to-indigo-950/40 p-6 rounded-xl border border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl">
                                <div class="flex items-center space-x-4">
                                    <div class="text-4xl bg-slate-950 p-3 rounded-xl border border-slate-700 shadow-inner" x-text="selectedAirline.logo"></div>
                                    <div>
                                        <h2 class="text-2xl font-bold text-white tracking-tight" x-text="selectedAirline.airlineName"></h2>
                                        <p class="text-xs text-slate-400 mt-0.5">GDS Identification: IATA: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.iata"></span> | ICAO: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.icao"></span></p>
                                    </div>
                                </div>
                                <div class="flex items-center bg-slate-950 border border-slate-800 p-1 rounded-lg">
                                    <button @click="viewMode = 'customer'" :class="viewMode === 'customer' ? 'bg-sky-600 text-white font-bold' : 'text-slate-400 hover:text-slate-200'" class="px-3 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider" x-text="i18n[currentLang].paxView"></button>
                                    <button @click="viewMode = 'agent'" :class="viewMode === 'agent' ? 'bg-indigo-600 text-white font-bold' : 'text-slate-400 hover:text-slate-200'" class="px-3 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider" x-text="i18n[currentLang].agentView"></button>
                                </div>
                            </div>

                            <template x-if="activePolicy === 'skchg'">
                                <div class="space-y-6">
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].skdTrigger"></span><span class="text-base font-bold text-amber-400 mt-1 block" x-text="selectedAirline.scheduleChange.threshold"></span></div>
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].travelWindow"></span><span class="text-base font-bold text-sky-400 mt-1 block" x-text="selectedAirline.scheduleChange.travelWindow"></span></div>
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].oalRebooking"></span><span class="text-base font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.scheduleChange.oalAllowed ? i18n[currentLang].allowed : i18n[currentLang].prohibited"></span></div>
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].refundEligibility"></span><span class="text-base font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.refundPolicy.refundAllowed ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">🔄</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="i18n[currentLang].skdHeader"></h3></div>
                                            <div class="space-y-3 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].minorLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.minorChange"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].majorLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.majorChange"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].cabinLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.sameCabin ? i18n[currentLang].strictCabin : i18n[currentLang].altCabin"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].rbdLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.sameBookingClass ? i18n[currentLang].exactRbd : i18n[currentLang].lowestRbd"></span></div>
                                                
                                                <template x-if="viewMode === 'agent'">
                                                    <div class="space-y-3 pt-3 border-t border-slate-800/60">
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].fallbackLabel"></span><span class="font-medium text-indigo-300 font-mono text-[11px] bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-right max-w-[200px]" x-text="selectedAirline.scheduleChange.lowestAvailableClass"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.scheduleChange.endorsementCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].endorseTextLabel"></span><span class="font-mono text-[11px] font-bold text-amber-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.scheduleChange.endorsementCode"></span></div>
                                                        <div class="flex justify-between pb-0.5" x-show="selectedAirline.scheduleChange.geoAllowance"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].geoLabel"></span><span class="font-medium text-slate-300 text-xs text-right max-w-[200px]" x-text="selectedAirline.scheduleChange.geoAllowance"></span></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">💰</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="i18n[currentLang].refundHeader"></h3></div>
                                            <div class="space-y-3 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].cancelRefundLabel"></span><span class="font-medium text-emerald-400" x-text="selectedAirline.refundPolicy.cancellationRefund ? i18n[currentLang].fullRefAuth : i18n[currentLang].creditShell"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].sigTriggerLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.refundPolicy.refundThreshold"></span></div>
                                                <template x-if="viewMode === 'agent'">
                                                    <div class="space-y-3 pt-3">
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].adminPenLabel"></span><span class="font-medium text-slate-300 font-mono text-[11px] bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-right max-w-[190px] truncate" x-text="selectedAirline.refundPolicy.penalty"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.refundPolicy.refundWaiverCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].cashRefLabel"></span><span class="font-mono text-[11px] font-bold text-emerald-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.refundPolicy.refundWaiverCode"></span></div>
                                                        <div class="flex justify-between pb-0.5" x-show="selectedAirline.refundPolicy.osiTourCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].gdsOsiLabel"></span><span class="font-mono text-[11px] font-bold text-sky-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800 max-w-[190px] truncate text-right" :title="selectedAirline.refundPolicy.osiTourCode" x-text="selectedAirline.refundPolicy.osiTourCode"></span></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template x-if="activePolicy === 'namecorr'">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fadeIn">
                                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                        <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">📝</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="i18n[currentLang].nameHeader"></h3></div>
                                        <div class="space-y-3 text-sm">
                                            <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].typoLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.nameCorrection?.typoAllowance || 'N/A'"></span></div>
                                            <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].legalLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.nameCorrection?.legalChange || 'N/A'"></span></div>
                                            <div class="flex justify-between pb-0.5"><span class="text-slate-400" x-text="i18n[currentLang].nameFeeLabel"></span><span class="font-medium text-amber-400 font-semibold" x-text="selectedAirline.nameCorrection?.penaltyFee || 'N/A'"></span></div>
                                        </div>
                                    </div>
                                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                        <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">⌨️</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="i18n[currentLang].gdsCmdHeader"></h3></div>
                                        <div class="space-y-3 text-sm">
                                            <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].passportLabel"></span><span class="font-medium text-slate-200 font-bold" x-text="selectedAirline.nameCorrection?.passportMatch ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                            <template x-if="viewMode === 'agent'">
                                                <div class="space-y-3 pt-1">
                                                    <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].gdsReissueLabel"></span><span class="font-mono text-[11px] font-bold text-emerald-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.nameCorrection?.gdsCommand || 'N/A'"></span></div>
                                                    <div class="flex justify-between pb-0.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].osiNameLabel"></span><span class="font-mono text-[11px] font-bold text-sky-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.nameCorrection?.osiString || 'N/A'"></span></div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
