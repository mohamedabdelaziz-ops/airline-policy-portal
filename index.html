        formAirline: {

            oalSkchg: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: '', sameBookingClass: '', lowestAvailableClass: '', endorsementCode: '', geoAllowance: '', rebookPriority: '', allianceAllowance: '', codeshareRules: '', contactEmail: '', contactPhone: '', refundThreshold: '', penalty: '', refundWaiverCode: '', osiTourCode: '', oalAirlineChangePolicy: '', oalAirlineRefundPolicy: '', customFields: [] },
            oalName: { typoAllowance: '', nicknameRule: '', invertedRule: '', additionalNameRule: '', legalChange: '', passportMatch: true, penaltyFee: '', gdsCommand: '', osiString: '', techRestrictions: '', fallbackProcess: '', contactEmail: '', contactPhone: '', nameOalRule: '', customFields: [] }

        init() {

                {
                    airlineName: 'Lufthansa Group', iata: 'LH', icao: 'DLH', logo: '🇩🇪', lastUpdated: '2026-06-29',
                    policyWebLink: 'https://www.lufthansagroup.com/en/themes/agency-support.html', policyPdfLink: '',
                    threshold: 'Varies by destination routing attributes', travelWindow: 'Subject to inventory reinstatement controls.', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pureSkchg: { minorChange: 'Time deviations below airline-defined threshold limits.', majorChange: 'Significant operation adjustments or scheduling cancellations.', sameCabin: 'Strict Cabin Balance Required.', sameBookingClass: 'Rebook original RBD class configuration if active.', lowestAvailableClass: 'Original booking class preferred.', endorsementCode: 'DUE SKCH', geoAllowance: 'Bilateral alternate rerouting constraints apply.', contactEmail: 'agency.support@lufthansagroup.com', contactPhone: '+49 69 86 799 799', refundThreshold: 'More than 3 hours deviation or cancel with no acceptable protection available.', penalty: 'None', refundWaiverCode: 'System Verified', osiTourCode: 'OS LH INVOL SKCHG', mainAirlinePolicy: 'Full refund authorized for delays exceeding 3 hours or outright structural cancellations. processed directly through normal ARC/BSP channels.', customFields: [] },
                    pureName: { typoAllowance: 'Up to two (2) letters in the first-, middle- or last name or title can be corrected directly by the travel agent in the GDS system.', nicknameRule: 'Correction of common nicknames/variants (e.g., BILL to WILLIAM) must be routed to Lufthansa Group.', invertedRule: 'Correction of names in an inverted sequence (e.g., PETER/WILLIAM to WILLIAM/PETER) must be handled by Lufthansa Group Agency Support.', additionalNameRule: 'Adding a first, middle, or last name as per travel document (proof required) is managed by Lufthansa Group Agency Support.', legalChange: 'Passenger name changes due to marriage, divorce, gender reassignment, legal proceedings and/or a new passport/ID are allowed.', passportMatch: true, penaltyFee: 'As of 01 July 2024, the Name Correction Fee has been completely abolished.', gdsCommand: 'Native ticket reissue as even exchange. No waiver from support is needed.', osiString: 'Endorsement Box text must be documented with: NAME CORRECTION.', techRestrictions: 'If an FQTV element is included, delete it and re-enter after correction.', fallbackProcess: 'If name correction in the ticket is not feasible, enter correct name as SSR DOCS element.', contactEmail: 'lhg.fulfillment@lufthansagroup.com', contactPhone: '+49 69 86 799 800', customFields: [] },
                    oalSkchg: { minorChange: 'OAL minor changes follow standard interline code agreements.', majorChange: 'Flight confirmations for higher booking classes are subject to fare differences if original class closed.', endorsementCode: 'DUE SKCH OAL', rebookPriority: '1. Star Alliance Partner -> 2. Other Interline partners.', allianceAllowance: 'Star Alliance carriers fully authorized inside identical cabin maps.', codeshareRules: 'Rebook on operating prime flight if marketing codeshare code drops.', contactEmail: 'oal.support@lufthansagroup.com', contactPhone: '+49 69 86 799 900', refundThreshold: '3+ Hours or structural misconnection', penalty: 'Subject to debit memo rules if protection skipped.', refundWaiverCode: 'OAL LHG INVOL', osiTourCode: 'OSI LH INVOL WITH OAL SECTOR', oalAirlineChangePolicy: 'Lufthansa Group support cannot assist with flight confirmations on other airlines. Fare differences apply if confirmed in higher RBD.', oalAirlineRefundPolicy: 'Authorized if the partner airline changes cause a structural misconnect or delay over 3 hours. Ticket stock 257/082/220/724 must be verified.', customFields: [] },
                    oalName: { techRestrictions: 'To avoid automated cancellation (UC/HX) of other airlines segments, a new PNR must be created.', fallbackProcess: 'Create entirely new PNR matching valid travel docs.', contactEmail: 'oal.support@lufthansagroup.com', contactPhone: '+49 69 86 799 900', nameOalRule: 'A fresh PNR must be created whenever a name correction is processed in a PNR containing external codeshare or interline segments to safeguard partner seats.', customFields: [] }
                },
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '🍁', lastUpdated: '2026-06-27',
                    policyWebLink: 'https://www.aircanada.com/agency', policyPdfLink: '',
                    threshold: '60 minutes', travelWindow: '+/-7 days (Sun/Intl market up to +/-30 days)', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pureSkchg: { minorChange: 'Less than 60 minutes time deviation.', majorChange: '60 minutes or more / Operating carrier change / Stop added.', sameCabin: 'Strict Cabin Balance Required.', sameBookingClass: 'Use original RBD. Fallback to lowest open code up to M class.', lowestAvailableClass: 'Original booking class preferred; up to Y class maximum fallback.', endorsementCode: 'DUE SKCH', geoAllowance: 'Sister cities or alternate nodes within 200 miles radius permitted.', contactEmail: 'agency.support@aircanada.ca', contactPhone: '+1 888 247 2262', refundThreshold: 'More than 3 hours deviation', penalty: 'None', refundWaiverCode: 'ACUSKEDCHG + Flight Number', osiTourCode: 'OS AC INVOL SKCHG', mainAirlinePolicy: 'Full complimentary rebooking on AC mainline flights inside identical cabins matching original routing loops.', customFields: [] },
                    pureName: { typoAllowance: 'Up to 3 characters free.', legalChange: 'Permitted with marriage certificate proof.', passportMatch: true, penaltyFee: 'Free for typos, otherwise $50 CAD.', gdsCommand: 'CHNH/LASTNAME/FIRSTNAME', osiString: 'OS AC CORR NAME', nicknameRule: 'Handled via core desk parameters', invertedRule: 'Supported if traveler identity matches completely', additionalNameRule: 'Appended upon matching complete passport manifest', techRestrictions: 'FQTV re-entry required', fallbackProcess: 'GDS native validation entry strings', contactEmail: 'trade.ca@aircanada.ca', contactPhone: '+1 888 247 2262', customFields: [] },
                    oalSkchg: { minorChange: 'Flight time change less than 3 hours. Rebook within +/-3 days North America, +/-7 days other destinations.', majorChange: 'Flight time change of 3 hours or more, or flight cancellation. Action segment status changes within 14 days.', sameCabin: 'Cabin to cabin rebooking required. Premium Economy/Rouge protection on airlines without PE must be rebooked in economy.', sameBookingClass: 'Pure Star Alliance: book lowest available booking code in the same cabin. For other airlines, rebook same class up to Y.', lowestAvailableClass: 'Economy up to M class, Premium Economy up to O class, Business/Signature up to J class if original flight is subsequently reinstated.', endorsementCode: 'SKCHxxxx (flight number) (e.g., SKCH1234)', geoAllowance: 'Alternate AC stations allowed within 200 miles radius (e.g., MIA and FLL). Same origin/destination and global direction must be respected.', rebookPriority: '1. AC/Express/Rouge -> 2. Atlantic Joint Venture (AC, UA, LHG for Transatlantic only) -> 3. AC codeshare via Star Alliance -> 4. Pure Star Alliance -> 5. AC codeshare via other airlines -> 6. Other airlines (North America/Caribbean/Mexico/Central America) -> 7. Other airlines for Australia/NZ (UA not permitted) -> 8. Pure Star Alliance/OAL for Transatlantic/Transpacific/South America.', allianceAllowance: 'Pure Star Alliance allowed using the lowest available booking code in the same cabin. For Transatlantic over-the-water protections, use AC marketed/operated or Atlantic Joint Venture carriers (AC, UA, LHG) only.', codeshareRules: 'Action status codes UN, NO, HX, WK, WL, WN, TK, UC, US, or DS. Change fee waived but additional collection applies for Economy higher than M class.', contactEmail: 'agency.support@aircanada.ca', contactPhone: '+1 888 247 2262', refundThreshold: 'TK or UN/TK 3 hours or more, cancellation, non-stop to connecting, more stops, airport change, cabin downgrade (US connections), change of operating carrier, or misconnection.', penalty: 'Change fee is waived for major schedule changes. Non-refundable taxes remain non-refundable.', refundWaiverCode: 'Waiver Box: SKCH00 (flight number). Accessibility: ACCESSxxxx. Cabin changes/regrades to/from US: REGRADExxxx.', osiTourCode: 'OSI AC INVOL SKCHG / Add schedule change remarks on the PNR accordingly.', oalAirlineChangePolicy: 'If original flight is subsequently reinstated, you may rebook clients on original flight without penalty. If original class unavailable, rebook Economy up to M, Premium Economy up to O, Business/Signature up to J.', oalAirlineRefundPolicy: 'Permitted through normal GDS processing for refundable tickets. Permitted for non-refundable tickets if delay is 3+ hours or cancelled.', customFields: [] },
                    oalName: { techRestrictions: 'OAL channels automatically drop connection blocks if names are modified directly on original records.', fallbackProcess: 'Generate split profiles inside the native workstation system parameters.', contactEmail: 'trade.ca@aircanada.ca', contactPhone: '+1 888 247 2262', nameOalRule: 'Name modifications containing active other airline (OAL) links require dropping those rows first to avoid sync cancellation glitches.', customFields: [] }
                }
            ];
            this.selectedAirline = this.airlines[0]; 
        },
        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        },
        verifyAdmin() {
            if(this.adminPasswordInput === 'admin123') {
                this.isAdminMode = true;
                this.adminPasswordInput = '';
            } else { alert('Access Denied'); }
        },
        addCustomField(pillar) {
            if(!this.newCustomLabel) return;
            this.formAirline[pillar].customFields.push({
                label: this.newCustomLabel,
                value: this.newCustomValue,
                allowed: this.newCustomStatus
            });
            this.newCustomLabel = ''; this.newCustomValue = ''; this.newCustomStatus = true;
        },
        removeCustomField(pillar, idx) {
            this.formAirline[pillar].customFields.splice(idx, 1);
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline data incomplete.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            const idx = this.airlines.findIndex(a => a.iata === this.formAirline.iata);
            if(idx !== -1) {
                this.airlines[idx] = JSON.parse(JSON.stringify(this.formAirline));
            } else {
                this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            }
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.isEditing = false; this.isAdminMode = false;
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            this.isEditing = true;
            this.isAdminMode = true;
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-29', policyWebLink: '', policyPdfLink: '',
                threshold: '', travelWindow: '', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                pureSkchg: { minorChange: '', majorChange: '', sameCabin: '', sameBookingClass: '', lowestAvailableClass: '', endorsementCode: '', geoAllowance: '', contactEmail: '', contactPhone: '', refundThreshold: '', penalty: '', refundWaiverCode: '', osiTourCode: '', mainAirlinePolicy: '', customFields: [] },
                pureName: { typoAllowance: '', nicknameRule: '', invertedRule: '', additionalNameRule: '', legalChange: '', passportMatch: true, penaltyFee: '', gdsCommand: '', osiString: '', techRestrictions: '', fallbackProcess: '', contactEmail: '', contactPhone: '', customFields: [] },
                oalSkchg: { minorChange: '', majorChange: '', sameCabin: '', sameBookingClass: '', lowestAvailableClass: '', endorsementCode: '', geoAllowance: '', rebookPriority: '', allianceAllowance: '', codeshareRules: '', contactEmail: '', contactPhone: '', refundThreshold: '', penalty: '', refundWaiverCode: '', osiTourCode: '', oalAirlineChangePolicy: '', oalAirlineRefundPolicy: '', customFields: [] },
                oalName: { typoAllowance: '', nicknameRule: '', invertedRule: '', additionalNameRule: '', legalChange: '', passportMatch: true, penaltyFee: '', gdsCommand: '', osiString: '', techRestrictions: '', fallbackProcess: '', contactEmail: '', contactPhone: '', nameOalRule: '', customFields: [] }
            };
            this.isEditing = false;
        }
    }" :dir="currentLang === 'ar' ? 'rtl' : 'ltr'" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased text-xs">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent" x-text="i18n[currentLang].title"></h1>
                    <p class="text-xs text-slate-400 font-medium" x-text="i18n[currentLang].subtitle"></p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="bg-slate-950 border border-slate-800 rounded-lg p-1 flex space-x-1">
                    <button @click="currentLang = 'en'" :class="currentLang === 'en' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">EN</button>
                    <button @click="currentLang = 'ar'" :class="currentLang === 'ar' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">AR</button>
                    <button @click="currentLang = 'fr'" :class="currentLang === 'fr' ? 'bg-sky-600 font-bold text-white' : 'text-slate-400 hover:text-white'" class="px-2 py-1 rounded text-xs transition">FR</button>
                </div>

                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-2 py-1 rounded text-white w-20 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-2 py-1 rounded ml-1 transition">Auth</button>
                </div>
                <template x-if="isAdminMode">
                    <button @click="isAdminMode = false; resetForm()" class="text-[10px] font-bold border border-slate-700 bg-slate-800 hover:bg-rose-600 text-white px-2.5 py-1 rounded transition uppercase">Lock</button>
                </template>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2" x-text="i18n[currentLang].searchLabel"></label>
                        <input type="text" :placeholder="i18n[currentLang].searchPlaceholder" x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider"><span x-text="i18n[currentLang].indexLabel"></span> (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center transition">
                                    <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode">
                                    <button @click="editAirline(airline)" class="p-2 bg-slate-900 hover:bg-amber-600 border border-slate-800 rounded text-xs text-amber-400 hover:text-white transition">✏️</button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl grid grid-cols-2 md:grid-cols-4 gap-1.5">
                    <button @click="activePolicy = 'pure_skchg'" :class="activePolicy === 'pure_skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabPureSkchg"></button>
                    <button @click="activePolicy = 'pure_name'" :class="activePolicy === 'pure_name' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabPureName"></button>
                    <button @click="activePolicy = 'oal_skchg'" :class="activePolicy === 'oal_skchg' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabOalSkchg"></button>
                    <button @click="activePolicy = 'oal_name'" :class="activePolicy === 'oal_name' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabOalName"></button>
                </div>

                <div x-show="isAdminMode" class="bg-[#0b1329] border border-slate-800 rounded-xl p-6 shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <h3 class="text-sm font-bold text-amber-400 tracking-wider uppercase">INJECT NEW FLEET POLICY RULESET</h3>
                        <button @click="resetForm()" class="bg-slate-800 text-xs px-2.5 py-1 rounded text-slate-300">Clear Form</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs">
                        <div><label class="block text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">ICAO Code</label><input type="text" x-model="formAirline.icao" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Emoji Logo</label><input type="text" x-model="formAirline.logo" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-center" /></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs pt-2">
                        <div><label class="block text-amber-400 mb-1">SKD CHG Trigger Metric</label><input type="text" x-model="formAirline.threshold" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-sky-400 mb-1">Travel Window Metric</label><input type="text" x-model="formAirline.travelWindow" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-emerald-400 mb-1">OAL Rebooking [ALLOWED/PROHIBITED]</label><input type="text" x-model="formAirline.oalRebookingVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
