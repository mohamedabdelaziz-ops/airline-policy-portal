<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruption Desk - Airline Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-sky-500 selection:text-white">

    <div x-data="{
        searchQuery: '',
        selectedAirline: null,
        isAdminMode: false,
        adminPasswordInput: '',
        isEditing: false,
        viewMode: 'agent', 
        currentLang: 'en',
        activePolicy: 'skchg', 
        airlines: [],
        
        i18n: {
            en: {
                title: 'DISRUPTION DESK',
                subtitle: 'Airline Policy Reference Hub',
                searchLabel: 'Search Fleet Index',
                searchPlaceholder: 'Carrier, IATA, ICAO...',
                indexLabel: 'Airlines Index',
                paxView: 'PASSENGER VIEW',
                agentView: 'AGENT VIEW',
                tabSkchg: '🔄 Schedule Change Framework',
                tabNameCorr: '📝 Name Correction Policy',
                skdTrigger: 'SKD CHG Trigger',
                travelWindow: 'Travel Window',
                oalRebooking: 'OAL Rebooking',
                refundEligibility: 'Refund Eligibility',
                skdHeader: 'SCHEDULE CHANGE FRAMEWORK',
                refundHeader: 'REFUND PROTOCOLS',
                minorLabel: 'Minor Change Profile',
                majorLabel: 'Major Change Profile',
                cabinLabel: 'Cabin Matching Rules',
                rbdLabel: 'Booking Class (RBD)',
                fallbackLabel: 'Inventory Fallback Target',
                reissueLabel: 'Ticket Reissue Required',
                endorseLabel: 'GDS Endorsement Waiver',
                endorseTextLabel: 'Endorsement Box Waiver Text',
                geoLabel: 'Geo Airport Allowance Map',
                cancelRefundLabel: 'Involuntary Cancel Refund',
                sigTriggerLabel: 'Significant Change Trigger',
                majorProtLabel: 'Major Change Protection',
                adminPenLabel: 'Involuntary Admin Penalties',
                gdsRefLabel: 'GDS Refund Waiver Injection',
                cashRefLabel: 'GDS Cash Refund Waiver Code',
                gdsOsiLabel: 'GDS OSI / Tour Code Box',
                
                // Advanced Routing & Contact Labels
                priorityLabel: 'Rebooking Order Priority',
                allianceLabel: 'Alliance Rebooking Allowance',
                codeshareLabel: 'Codeshare / Interline Mapping',
                contactEmailLabel: 'Support Desks Contact Email',
                contactPhoneLabel: 'Support Desks Contact Phone',
                
                // Expanded Name Correction Policy Labels (LHG Guidelines Compliance)
                nameHeader: 'NAME CORRECTION RULES',
                gdsCmdHeader: 'GDS COMMANDS & REISSUE',
                typoLabel: 'Self-Service Typo Tolerance Threshold',
                nicknameLabel: 'Nickname / Alternative Variant Mapping',
                invertedLabel: 'Inverted Given/Surname Sequence Rules',
                additionalNameLabel: 'Adding Second First/Middle/Last Names',
                legalLabel: 'Legal / Marriage Changes',
                passportLabel: 'Passport Match Required',
                nameFeeLabel: 'Change Penalties / Fees',
                gdsReissueLabel: 'Reissue / Swap Command',
                osiNameLabel: 'OSI Formatting String',
                techRestrictLabel: 'Technical Infrastructure Restrictions',
                fallbackProcessLabel: 'Non-Feasible Secondary Workarounds',
                
                noneDefined: 'None Defined',
                allowed: 'ALLOWED',
                prohibited: 'PROHIBITED',
                yes: 'YES',
                no: 'NO',
                strictCabin: 'Strict Balance Required',
                altCabin: 'Alternative Class Permitted',
                exactRbd: 'Exact RBD Match Required',
                lowestRbd: 'Lowest Class Allowed',
                reissueNeeded: 'YES - Reissue Needed',
                reissueWaiver: 'NO - Authority Waiver Only',
                mandWaiver: 'Mandatory Waiver Code',
                autoWaiver: 'Automated Verification Code',
                fullRefAuth: 'Full Refund Authorized',
                creditShell: 'Credit Shell Voucher',
                noSelection: 'No Carrier Selection Detected'
            }
        },

        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-27',
            scheduleChange: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: '', sameBookingClass: '', lowestAvailableClass: '', oalAllowed: false, ticketReissue: true, endorsementCode: '', geoAllowance: '', rebookPriority: '', allianceAllowance: '', codeshareRules: '', contactEmail: '', contactPhone: '' },
            refundPolicy: { refundAllowed: false, refundThreshold: '', cancellationRefund: false, majorScheduleChangeRefund: false, penalty: 'None', refundWaiverCode: '', osiTourCode: '' },
            nameCorrection: { typoAllowance: '', nicknameRule: '', invertedRule: '', additionalNameRule: '', legalChange: '', passportMatch: true, penaltyFee: 'Free of Charge', gdsCommand: '', osiString: '', techRestrictions: '', fallbackProcess: '', contactEmail: '', contactPhone: '' }
        },

        init() {
            this.airlines = [
                {
                    airlineName: 'Lufthansa Group', iata: 'LH', icao: 'DLH', logo: '🇩🇪', lastUpdated: '2026-06-27',
                    scheduleChange: { 
                        minorChange: 'Time deviations below airline-defined threshold limits.', 
                        majorChange: 'Significant operation adjustments or scheduling cancellations.', 
                        threshold: 'Varies by destination routing attributes', 
                        travelWindow: 'Subject to inventory reinstatement controls.', 
                        sameCabin: 'Strict Cabin Balance Required.', 
                        sameBookingClass: 'Rebook original RBD class configuration if active.', 
                        lowestAvailableClass: 'Original booking class preferred.', 
                        oalAllowed: true, 
                        ticketReissue: true, 
                        endorsementCode: 'NAME CORRECTION', 
                        geoAllowance: 'Bilateral alternate rerouting constraints apply.',
                        rebookPriority: '1. LHG Operating Prime -> 2. LHG Marketing Codeshare -> 3. Star Alliance Partner Carriers.',
                        allianceAllowance: 'Star Alliance operating flights available if closed in prime tiers.',
                        codeshareRules: 'Codeshare re-mapping supported across coordinated cross-operating nodes.',
                        contactEmail: 'agency.support@lufthansagroup.com',
                        contactPhone: '+49 69 86 799 799'
                    },
                    refundPolicy: { refundAllowed: true, refundThreshold: 'Involuntary limits apply', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'None', refundWaiverCode: 'System Verified', osiTourCode: 'OS LH INVOL SKCHG' },
                    nameCorrection: { 
                        typoAllowance: 'Up to two (2) letters in the first, middle, or last name/title can be corrected directly by the travel agent in the reservation system (e.g., BRWON to BROWN, or updating titles like MR/MRS/MX). One correction per person.', 
                        nicknameRule: 'Correction of common variants (e.g., BILL to WILLIAM, USCHI to URSULA, PACO to FRANCISCO) must be processed through Lufthansa Group.', 
                        invertedRule: 'Inverted sequences (e.g., PETER/WILLIAM to WILLIAM/PETER or MEIER/PETER HANS to MEIER/HANS PETER) must be routed to Agency Support.', 
                        additionalNameRule: 'Adding first, middle, or last names to match the travel document exactly is allowed via Agency Support. Deletion of second first/middle/family names is prohibited.', 
                        legalChange: 'Permitted due to marriage, divorce, gender reassignment, legal proceedings, or new passport issuance. Requires verification of legal certificates.', 
                        passportMatch: true, 
                        penaltyFee: 'As of July 01, 2024, the Name Correction Fee has been completely abolished. Processed entirely free of charge.', 
                        gdsCommand: 'REISSUE AS EVEN EXCHANGE / INPUT BOX ENTRY', 
                        osiString: 'ENDBOX STAMP: NAME CORRECTION', 
                        techRestrictions: 'To prevent automated cancellation (UC/HX) of other airline (OAL) segments, a new PNR must be created if OAL flights exist. Name corrections on WK operated flights require a new PNR. Delete FQTV elements before editing if technical blocks occur.', 
                        fallbackProcess: 'If name correction on the ticket is unfeasible, add an SSR DOCS element in the original PNR format: SSR DOCS YY HK1 ////DDMMMYY/F//LAST NAME/FIRST NAME/MIDDLE NAME. Online check-in must use the exact PNR name field.',
                        contactEmail: 'lhg.fulfillment@lufthansagroup.com',
                        contactPhone: '+49 69 86 799 800'
                    }
                },
                {
                    airlineName: 'Delta Air Lines', iata: 'DL', icao: 'DAL', logo: '📐', lastUpdated: '2026-06-27',
                    scheduleChange: { 
                        minorChange: 'Delay less than 120 minutes with no itinerary misconnection.', 
                        majorChange: 'Delay of 120+ minutes / Added routing stops / Mainline-to-Connection equipment swap / Misconnects / Flight cancellations with no active routing option within 120 mins.', 
                        threshold: '120 minutes / Stop Added', 
                        travelWindow: '+/- 2 days of original flight date (Outbound changes allow changing unaffected return to protect trip length).', 
                        sameCabin: 'Cabin to Cabin matching strictly required', 
                        sameBookingClass: 'Same Class if available; fallback to next available class up to Y Class', 
                        lowestAvailableClass: 'Same class preferred; Main Cabin up to Y Class fallback', 
                        oalAllowed: false, 
                        ticketReissue: true, 
                        endorsementCode: 'None Needed', 
                        geoAllowance: 'Alternate airport rebooking allowed within 100 Mile radius',
                        rebookPriority: '1. Delta Prime / Connection -> 2. DL* Joint Venture Codeshare (AF/KL/VS) -> 3. SkyTeam Alliances Network.',
                        allianceAllowance: 'SkyTeam operating partners available for priority protection routes when DL prime options are exhausted.',
                        codeshareRules: 'May rebook ticketed DL* flight on operating prime flight when codeshare equivalent is dropped, keeping same inventory tier attributes.',
                        contactEmail: 'global.salessupport@delta.com',
                        contactPhone: '+1 800 241 4141'
                    },
                    refundPolicy: { 
                        refundAllowed: true, 
                        refundThreshold: '120 minutes delay / Added stops / Mainline-to-Connection equipment swap / Misconnects / Cancellations.', 
                        cancellationRefund: true, 
                        majorScheduleChangeRefund: true, 
                        penalty: 'None. Failure to follow specific policy exception guidelines may result in an Agency Debit Memo.', 
                        refundWaiverCode: 'Exempt via GDS verification rule', 
                        osiTourCode: 'OSI DL REFUNDED PER UNACCEPTABLE SKED CHG/ DATE' 
                    },
                    nameCorrection: { typoAllowance: 'Up to 3 characters free in first or middle names.', nicknameRule: 'Bilateral match processing rules dictate swap allowances.', invertedRule: 'Supported via explicit back-office manual intervention entries.', additionalNameRule: 'Allowed with complete travel document verification.', legalChange: 'Allowed with official decree documents', passportMatch: true, penaltyFee: '$150 USD Admin Fee for major swaps', gdsCommand: 'OSI DL NAME CORRECTION SEC', osiString: 'OS DL REISSUE TYPO CORR', techRestrictions: 'GDS operational limitations require active ticket segment validation syncing.', fallbackProcess: 'Manual re-routing or waiver token authorization via support line assistance.', contactEmail: 'trade.support@delta.com', contactPhone: '+1 800 325 1551' }
                }
            ];
            this.selectedAirline = this.airlines[0]; 
        },
        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline Name and IATA Code are required.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            if(this.formAirline.icao) this.formAirline.icao = this.formAirline.icao.toUpperCase();
            
            if(this.isEditing) {
                const idx = this.airlines.findIndex(a => a.iata === this.formAirline.iata);
                if(idx !== -1) this.airlines[idx] = JSON.parse(JSON.stringify(this.formAirline));
            } else {
                this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            }
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.resetForm();
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            this.isEditing = true;
            this.isAdminMode = true;
        }
    }" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent" x-text="i18n[currentLang].title"></h1>
                    <p class="text-xs text-slate-400 font-medium" x-text="i18n[currentLang].subtitle"></p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-2 py-1 rounded text-white w-20 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-2 py-1 rounded ml-1 transition">Auth</button>
                </div>
                <template x-if="isAdminMode">
                    <button @click="isAdminMode = false; resetForm()" class="text-[10px] font-bold border border-slate-700 bg-slate-800 hover:bg-rose-600 text-white px-2.5 py-1 rounded transition uppercase">Lock</button>
                </template>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2" x-text="i18n[currentLang].searchLabel"></label>
                        <input type="text" :placeholder="i18n[currentLang].searchPlaceholder" x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white placeholder-slate-500 transition text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider"><span x-text="i18n[currentLang].indexLabel"></span> (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center transition">
                                    <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode">
                                    <button @click="editAirline(airline)" class="p-2 bg-slate-900 hover:bg-amber-600 border border-slate-800 rounded text-xs text-amber-400 hover:text-white transition">✏️</button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl flex space-x-2">
                    <button @click="activePolicy = 'skchg'" :class="activePolicy === 'skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-md font-bold' : 'text-slate-400 hover:text-slate-200'" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition" x-text="i18n[currentLang].tabSkchg"></button>
                    <button @click="activePolicy = 'namecorr'" :class="activePolicy === 'namecorr' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-md font-bold' : 'text-slate-400 hover:text-slate-200'" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition" x-text="i18n[currentLang].tabNameCorr"></button>
                </div>

                <div x-show="isAdminMode" class="bg-slate-900 border-2 border-amber-500/20 rounded-xl p-6 shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <h3 class="font-bold text-sm text-amber-400 uppercase tracking-wider" x-text="isEditing ? 'Modify Carrier Profiles Matrix' : 'Inject New Fleet Policy Ruleset'"></h3>
                        <button @click="resetForm()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white px-3 py-1 rounded">Clear Form</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs">
                        <div><label class="block font-semibold text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" placeholder="AI" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">ICAO Code</label><input type="text" x-model="formAirline.icao" placeholder="AIC" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">Emoji Logo</label><input type="text" x-model="formAirline.logo" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white text-center" /></div>
                    </div>
                    
                    <div class="border-t border-slate-800/80 pt-4 space-y-4">
                        <h4 class="text-xs font-bold text-sky-400 uppercase tracking-widest">1. Schedule Change Parameters & Channels</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                            <div><label class="block font-semibold text-slate-400 mb-1">Minor Change Profile</label><input type="text" x-model="formAirline.scheduleChange.minorChange" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Major Change Profile</label><input type="text" x-model="formAirline.scheduleChange.majorChange" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Trigger Threshold</label><input type="text" x-model="formAirline.scheduleChange.threshold" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Travel Window</label><input type="text" x-model="formAirline.scheduleChange.travelWindow" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Cabin Matching Rules</label><input type="text" x-model="formAirline.scheduleChange.sameCabin" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Booking Class (RBD) Rules</label><input type="text" x-model="formAirline.scheduleChange.sameBookingClass" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Fallback Class Target</label><input type="text" x-model="formAirline.scheduleChange.lowestAvailableClass" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Endorsement Waiver Text</label><input type="text" x-model="formAirline.scheduleChange.endorsementCode" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Geo Allowance Map</label><input type="text" x-model="formAirline.scheduleChange.geoAllowance" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            
                            <div><label class="block font-semibold text-amber-400 mb-1">Rebooking Order Priority</label><input type="text" x-model="formAirline.scheduleChange.rebookPriority" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-amber-400 mb-1">Alliance Rebooking Allowance</label><input type="text" x-model="formAirline.scheduleChange.allianceAllowance" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-amber-400 mb-1">Codeshare / Interline Mapping</label><input type="text" x-model="formAirline.scheduleChange.codeshareRules" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            
                            <div><label class="block font-semibold text-rose-400 mb-1">SKCHG Contact Email</label><input type="text" x-model="formAirline.scheduleChange.contactEmail" placeholder="agency.support@airline.com" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white focus:ring-1 focus:ring-rose-500" /></div>
                            <div class="md:col-span-2"><label class="block font-semibold text-rose-400 mb-1">SKCHG Contact Phone</label><input type="text" x-model="formAirline.scheduleChange.contactPhone" placeholder="+1 800 XXX XXXX" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white focus:ring-1 focus:ring-rose-500" /></div>
                        </div>
                    </div>

                    <div class="border-t border-slate-800/80 pt-4 space-y-4">
                        <h4 class="text-xs font-bold text-emerald-400 uppercase tracking-widest">2. Refund Parameters</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                            <div><label class="block font-semibold text-slate-400 mb-1">Refund Change Threshold</label><input type="text" x-model="formAirline.refundPolicy.refundThreshold" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Involuntary Admin Fee / Penalties</label><input type="text" x-model="formAirline.refundPolicy.penalty" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">GDS Refund Waiver Code</label><input type="text" x-model="formAirline.refundPolicy.refundWaiverCode" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div class="md:col-span-3"><label class="block font-semibold text-emerald-400 mb-1">GDS OSI / Tour Code Box</label><input type="text" x-model="formAirline.refundPolicy.osiTourCode" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        </div>
                    </div>

                    <div class="border-t border-slate-800/80 pt-4 space-y-4">
                        <h4 class="text-xs font-bold text-purple-400 uppercase tracking-widest">3. Name Correction Parameters & Contact Channels</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                            <div><label class="block font-semibold text-slate-400 mb-1">Self-Service Typo Tolerance Threshold</label><input type="text" x-model="formAirline.nameCorrection.typoAllowance" placeholder="e.g. Up to 2 characters" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Nickname Variants Matching Rule</label><input type="text" x-model="formAirline.nameCorrection.nicknameRule" placeholder="e.g. Allowed via support desk swap checks" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Inverted Name Sequence Handling</label><input type="text" x-model="formAirline.nameCorrection.invertedRule" placeholder="e.g. Supported with documentation validation" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Adding Open Additional Names</label><input type="text" x-model="formAirline.nameCorrection.additionalNameRule" placeholder="e.g. Free to append missing given/middle tokens" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Legal Changes & Proof Matrix</label><input type="text" x-model="formAirline.nameCorrection.legalChange" placeholder="e.g. Marriage/Divorce decrees accepted" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Change Penalties / Fees</label><input type="text" x-model="formAirline.nameCorrection.penaltyFee" placeholder="e.g. Free of charge" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">GDS Reissue / Swap Command</label><input type="text" x-model="formAirline.nameCorrection.gdsCommand" placeholder="e.g. GDS Native format entry string" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">OSI / Endorsement Text String</label><input type="text" x-model="formAirline.nameCorrection.osiString" placeholder="e.g. NAME CORRECTION" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div><label class="block font-semibold text-slate-400 mb-1">Technical Sync & PNR Restrictions</label><input type="text" x-model="formAirline.nameCorrection.techRestrictions" placeholder="e.g. OAL segments require generating fresh PNR splits" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            <div class="md:col-span-3"><label class="block font-semibold text-slate-400 mb-1">Non-Feasible Secondary Workarounds (SSR DOCS mapping)</label><input type="text" x-model="formAirline.nameCorrection.fallbackProcess" placeholder="e.g. Inject SSR DOCS string elements to retain original coupon lines" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            
                            <div><label class="block font-semibold text-rose-400 mb-1">Name Correction Contact Email</label><input type="text" x-model="formAirline.nameCorrection.contactEmail" placeholder="namecorr.support@airline.com" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white focus:ring-1 focus:ring-rose-500" /></div>
                            <div class="md:col-span-2"><label class="block font-semibold text-rose-400 mb-1">Name Correction Contact Phone</label><input type="text" x-model="formAirline.nameCorrection.contactPhone" placeholder="+1 800 XXX XXXX" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white focus:ring-1 focus:ring-rose-500" /></div>
                        </div>
                    </div>
                    
                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase text-xs tracking-wider rounded-lg shadow-lg hover:from-amber-400 hover:to-orange-500 transition">Save Data Object to Fleet Index</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            
                            <div class="bg-gradient-to-r from-slate-900 via-slate-900 to-indigo-950/40 p-6 rounded-xl border border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl">
                                <div class="flex items-center space-x-4">
                                    <div class="text-4xl bg-slate-950 p-3 rounded-xl border border-slate-700 shadow-inner" x-text="selectedAirline.logo"></div>
                                    <div>
                                        <h2 class="text-2xl font-bold text-white tracking-tight" x-text="selectedAirline.airlineName"></h2>
                                        <p class="text-xs text-slate-400 mt-0.5">GDS Identification: IATA: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.iata"></span> | ICAO: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.icao"></span></p>
                                    </div>
                                </div>
                                <div class="flex items-center bg-slate-950 border border-slate-800 p-1 rounded-lg">
                                    <button @click="viewMode = 'customer'" :class="viewMode === 'customer' ? 'bg-sky-600 text-white font-bold' : 'text-slate-400 hover:text-white'" class="px-3 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider" x-text="i18n[currentLang].paxView"></button>
                                    <button @click="viewMode = 'agent'" :class="viewMode === 'agent' ? 'bg-indigo-600 text-white font-bold' : 'text-slate-400 hover:text-white'" class="px-3 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider" x-text="i18n[currentLang].agentView"></button>
                                </div>
                            </div>

                            <template x-if="activePolicy === 'skchg'">
                                <div class="space-y-6">
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].skdTrigger"></span><span class="text-base font-bold text-amber-400 mt-1 block" x-text="selectedAirline.scheduleChange.threshold"></span></div>
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].travelWindow"></span><span class="text-base font-bold text-sky-400 mt-1 block" x-text="selectedAirline.scheduleChange.travelWindow"></span></div>
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].oalRebooking"></span><span class="text-base font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.scheduleChange.oalAllowed ? i18n[currentLang].allowed : i18n[currentLang].prohibited"></span></div>
                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].refundEligibility"></span><span class="text-base font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.refundPolicy.refundAllowed ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">🔄</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="i18n[currentLang].skdHeader"></h3></div>
                                            <div class="space-y-3 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].minorLabel"></span><span class="font-medium text-slate-200 text-right max-w-[220px]" x-text="selectedAirline.scheduleChange.minorChange"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].majorLabel"></span><span class="font-medium text-slate-200 text-right max-w-[220px]" x-text="selectedAirline.scheduleChange.majorChange"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].cabinLabel"></span><span class="font-medium text-slate-200 text-right max-w-[220px]" x-text="selectedAirline.scheduleChange.sameCabin"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].rbdLabel"></span><span class="font-medium text-slate-200 text-right max-w-[220px]" x-text="selectedAirline.scheduleChange.sameBookingClass"></span></div>
                                                
                                                <template x-if="viewMode === 'agent'">
                                                    <div class="space-y-3 pt-3 border-t border-slate-800/60">
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].fallbackLabel"></span><span class="font-medium text-indigo-300 font-mono text-[11px] bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-right max-w-[200px]" x-text="selectedAirline.scheduleChange.lowestAvailableClass"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.scheduleChange.endorsementCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].endorseTextLabel"></span><span class="font-mono text-[11px] font-bold text-amber-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.scheduleChange.endorsementCode"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.scheduleChange.geoAllowance"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].geoLabel"></span><span class="font-medium text-slate-300 text-xs text-right max-w-[200px]" x-text="selectedAirline.scheduleChange.geoAllowance"></span></div>
                                                        
                                                        <div class="flex flex-col space-y-1 bg-slate-950 p-2.5 rounded-lg border border-slate-800 mt-2" x-show="selectedAirline.scheduleChange.rebookPriority">
                                                            <span class="text-[10px] font-bold text-amber-400 uppercase tracking-wider" x-text="i18n[currentLang].priorityLabel"></span>
                                                            <p class="text-xs text-slate-300 font-medium leading-relaxed" x-text="selectedAirline.scheduleChange.rebookPriority"></p>
                                                        </div>
                                                        <div class="flex flex-col space-y-1 bg-slate-950 p-2.5 rounded-lg border border-slate-800" x-show="selectedAirline.scheduleChange.allianceAllowance">
                                                            <span class="text-[10px] font-bold text-sky-400 uppercase tracking-wider" x-text="i18n[currentLang].allianceLabel"></span>
                                                            <p class="text-xs text-slate-300 font-medium leading-relaxed" x-text="selectedAirline.scheduleChange.allianceAllowance"></p>
                                                        </div>
                                                        <div class="flex flex-col space-y-1 bg-slate-950 p-2.5 rounded-lg border border-slate-800" x-show="selectedAirline.scheduleChange.codeshareRules">
                                                            <span class="text-[10px] font-bold text-purple-400 uppercase tracking-wider" x-text="i18n[currentLang].codeshareLabel"></span>
                                                            <p class="text-xs text-slate-300 font-medium leading-relaxed" x-text="selectedAirline.scheduleChange.codeshareRules"></p>
                                                        </div>

                                                        <div class="pt-2 mt-2 border-t border-slate-800/60 grid grid-cols-1 gap-2 bg-slate-950/60 p-3 rounded-lg border border-dashed border-slate-800">
                                                            <div class="flex justify-between items-center" x-show="selectedAirline.scheduleChange.contactEmail">
                                                                <span class="text-slate-400 text-[11px]" x-text="i18n[currentLang].contactEmailLabel"></span>
                                                                <span class="font-mono text-xs text-rose-400 select-all text-right" x-text="selectedAirline.scheduleChange.contactEmail"></span>
                                                            </div>
                                                            <div class="flex justify-between items-center" x-show="selectedAirline.scheduleChange.contactPhone">
                                                                <span class="text-slate-400 text-[11px]" x-text="i18n[currentLang].contactPhoneLabel"></span>
                                                                <span class="font-mono text-xs text-rose-400 select-all text-right" x-text="selectedAirline.scheduleChange.contactPhone"></span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">💰</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="i18n[currentLang].refundHeader"></h3></div>
                                            <div class="space-y-3 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].cancelRefundLabel"></span><span class="font-medium text-emerald-400 text-right max-w-[220px]" x-text="selectedAirline.refundPolicy.cancellationRefund ? i18n[currentLang].fullRefAuth : i18n[currentLang].creditShell"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].sigTriggerLabel"></span><span class="font-medium text-slate-200 text-right max-w-[220px]" x-text="selectedAirline.refundPolicy.refundThreshold"></span></div>
                                                <template x-if="viewMode === 'agent'">
                                                    <div class="space-y-3 pt-3 border-t border-slate-800/60">
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].adminPenLabel"></span><span class="font-medium text-slate-300 font-mono text-[11px] bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-right max-w-[190px] truncate" x-text="selectedAirline.refundPolicy.penalty"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.refundPolicy.refundWaiverCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].cashRefLabel"></span><span class="font-mono text-[11px] font-bold text-emerald-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.refundPolicy.refundWaiverCode"></span></div>
                                                        <div class="flex justify-between pb-0.5" x-show="selectedAirline.refundPolicy.osiTourCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].gdsOsiLabel"></span><span class="font-mono text-[11px] font-bold text-sky-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800 max-w-[190px] truncate text-right" :title="selectedAirline.refundPolicy.osiTourCode" x-text="selectedAirline.refundPolicy.osiTourCode"></span></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
</template>

                            <template x-if="activePolicy === 'namecorr'">
                                <div class="grid grid-cols-1 gap-6 animate-fadeIn">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        
                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">📝</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="i18n[currentLang].nameHeader"></h3></div>
                                            <div class="space-y-3.5 text-sm">
                                                <div class="flex flex-col border-b border-slate-800/40 pb-2"><span class="text-slate-400 font-semibold text-xs mb-1" x-text="i18n[currentLang].typoLabel"></span><p class="text-slate-200 text-xs leading-relaxed" x-text="selectedAirline.nameCorrection?.typoAllowance || 'N/A'"></p></div>
                                                <div class="flex flex-col border-b border-slate-800/40 pb-2"><span class="text-slate-400 font-semibold text-xs mb-1" x-text="i18n[currentLang].nicknameLabel"></span><p class="text-slate-200 text-xs leading-relaxed" x-text="selectedAirline.nameCorrection?.nicknameRule || 'N/A'"></p></div>
                                                <div class="flex flex-col border-b border-slate-800/40 pb-2"><span class="text-slate-400 font-semibold text-xs mb-1" x-text="i18n[currentLang].invertedLabel"></span><p class="text-slate-200 text-xs leading-relaxed" x-text="selectedAirline.nameCorrection?.invertedRule || 'N/A'"></p></div>
                                                <div class="flex flex-col border-b border-slate-800/40 pb-2"><span class="text-slate-400 font-semibold text-xs mb-1" x-text="i18n[currentLang].additionalNameLabel"></span><p class="text-slate-200 text-xs leading-relaxed" x-text="selectedAirline.nameCorrection?.additionalNameRule || 'N/A'"></p></div>
                                                <div class="flex flex-col border-b border-slate-800/40 pb-2"><span class="text-slate-400 font-semibold text-xs mb-1" x-text="i18n[currentLang].legalLabel"></span><p class="text-slate-200 text-xs leading-relaxed" x-text="selectedAirline.nameCorrection?.legalChange || 'N/A'"></p></div>
                                                <div class="flex justify-between pb-0.5"><span class="text-slate-400 font-semibold text-xs" x-text="i18n[currentLang].nameFeeLabel"></span><span class="font-medium text-amber-400 font-bold text-xs" x-text="selectedAirline.nameCorrection?.penaltyFee || 'N/A'"></span></div>
                                            </div>
                                        </div>

                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">⌨️</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="i18n[currentLang].gdsCmdHeader"></h3></div>
                                            <div class="space-y-3.5 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].passportLabel"></span><span class="font-medium text-slate-200 font-bold" x-text="selectedAirline.nameCorrection?.passportMatch ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                                
                                                <template x-if="viewMode === 'agent'">
                                                    <div class="space-y-3.5 pt-1">
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].gdsReissueLabel"></span><span class="font-mono text-[11px] font-bold text-emerald-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.nameCorrection?.gdsCommand || 'N/A'"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].osiNameLabel"></span><span class="font-mono text-[11px] font-bold text-sky-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.nameCorrection?.osiString || 'N/A'"></span></div>
                                                        
                                                        <div class="flex flex-col space-y-1 bg-slate-950 p-2.5 rounded-lg border border-slate-800 mt-2" x-show="selectedAirline.nameCorrection?.techRestrictions">
                                                            <span class="text-[10px] font-bold text-amber-500 uppercase tracking-wider" x-text="i18n[currentLang].techRestrictLabel"></span>
                                                            <p class="text-[11px] text-slate-400 leading-relaxed font-medium" x-text="selectedAirline.nameCorrection.techRestrictions"></p>
                                                        </div>
                                                        <div class="flex flex-col space-y-1 bg-slate-950 p-2.5 rounded-lg border border-slate-800" x-show="selectedAirline.nameCorrection?.fallbackProcess">
                                                            <span class="text-[10px] font-bold text-purple-400 uppercase tracking-wider" x-text="i18n[currentLang].fallbackProcessLabel"></span>
                                                            <p class="text-[11px] text-slate-400 leading-relaxed font-medium" x-text="selectedAirline.nameCorrection.fallbackProcess"></p>
                                                        </div>

                                                        <div class="pt-2 mt-2 border-t border-slate-800/60 grid grid-cols-1 gap-2 bg-slate-950/60 p-3 rounded-lg border border-dashed border-slate-800">
                                                            <div class="flex justify-between items-center" x-show="selectedAirline.nameCorrection?.contactEmail">
                                                                <span class="text-slate-400 text-[11px]" x-text="i18n[currentLang].contactEmailLabel"></span>
                                                                <span class="font-mono text-xs text-purple-400 select-all text-right" x-text="selectedAirline.nameCorrection.contactEmail"></span>
                                                            </div>
                                                            <div class="flex justify-between items-center" x-show="selectedAirline.nameCorrection?.contactPhone">
                                                                <span class="text-slate-400 text-[11px]" x-text="i18n[currentLang].contactPhoneLabel"></span>
                                                                <span class="font-mono text-xs text-purple-400 select-all text-right" x-text="selectedAirline.nameCorrection.contactPhone"></span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </template>
                            
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
