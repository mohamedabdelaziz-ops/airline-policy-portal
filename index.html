                }
            ];
            this.selectedAirline = this.airlines[1]; // Pre-loads Delta Air Lines
        },
        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        }

                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider"><span x-text="i18n[currentLang].indexLabel"></span> (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="w-full text-left p-3 rounded-lg flex justify-between items-center transition">
                                <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>

                </div>

                                    <div>
                                        <h2 class="text-2xl font-bold text-white tracking-tight" x-text="selectedAirline.airlineName"></h2>
                                        <p class="text-xs text-slate-400 mt-0.5">GDS Identification: IATA: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.iata"></span> | ICAO: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.icao"></span></p>
                                    </div>
                                </div>
                                <div class="flex items-center bg-slate-950 border border-slate-800 p-1 rounded-lg">

                                    <button @click="viewMode = 'agent'" :class="viewMode === 'agent' ? 'bg-indigo-600 text-white font-bold' : 'text-slate-400 hover:text-slate-200'" class="px-3 py-1.5 rounded-md text-xs font-bold uppercase tracking-wider" x-text="i18n[currentLang].agentView"></button>
                                </div>
                            </div>

                            <template x-if="activePolicy === 'skchg'">
                                <div class="space-y-6">

                                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].refundEligibility"></span><span class="text-base font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.refundPolicy.refundAllowed ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                            <div class="space-y-3 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].minorLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.minorChange"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].majorLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.majorChange"></span></div>

                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].rbdLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.sameBookingClass ? i18n[currentLang].exactRbd : i18n[currentLang].lowestRbd"></span></div>

                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].reissueLabel"></span><span class="font-mono text-[11px] font-bold" :class="selectedAirline.scheduleChange.ticketReissue ? 'text-emerald-400' : 'text-rose-400'" x-text="selectedAirline.scheduleChange.ticketReissue ? i18n[currentLang].reissueNeeded : i18n[currentLang].reissueWaiver"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].endorseLabel"></span><span class="font-mono text-[11px] font-bold" :class="selectedAirline.scheduleChange.waiverRequired ? 'text-amber-400' : 'text-emerald-400'" x-text="selectedAirline.scheduleChange.waiverRequired ? i18n[currentLang].mandWaiver : i18n[currentLang].autoWaiver"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.scheduleChange.endorsementCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].endorseTextLabel"></span><span class="font-mono text-[11px] font-bold text-amber-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.scheduleChange.endorsementCode"></span></div>
                                                        <div class="flex justify-between pb-0.5" x-show="selectedAirline.scheduleChange.geoAllowance"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].geoLabel"></span><span class="font-medium text-slate-300 text-xs text-right max-w-[200px]" x-text="selectedAirline.scheduleChange.geoAllowance"></span></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>

                                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                            <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">💰</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="i18n[currentLang].refundHeader"></h3></div>
                                            <div class="space-y-3 text-sm">
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].cancelRefundLabel"></span><span class="font-medium text-emerald-400" x-text="selectedAirline.refundPolicy.cancellationRefund ? i18n[currentLang].fullRefAuth : i18n[currentLang].creditShell"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].sigTriggerLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.refundPolicy.refundThreshold"></span></div>
                                                <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].majorProtLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.refundPolicy.majorScheduleChangeRefund ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                                
                                                <template x-if="viewMode === 'agent'">
                                                    <div class="space-y-3 pt-3 border-t border-slate-800/60">
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].adminPenLabel"></span><span class="font-medium text-slate-300 font-mono text-[11px] bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-right max-w-[190px] truncate" x-text="selectedAirline.refundPolicy.penalty"></span></div>
                                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5" x-show="selectedAirline.refundPolicy.refundWaiverCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].cashRefLabel"></span><span class="font-mono text-[11px] font-bold text-emerald-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.refundPolicy.refundWaiverCode"></span></div>
                                                        <div class="flex justify-between pb-0.5" x-show="selectedAirline.refundPolicy.osiTourCode"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].gdsOsiLabel"></span><span class="font-mono text-[11px] font-bold text-sky-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800 max-w-[190px] truncate text-right" :title="selectedAirline.refundPolicy.osiTourCode" x-text="selectedAirline.refundPolicy.osiTourCode"></span></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template x-if="activePolicy === 'namecorr'">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fadeIn">
                                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                        <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">📝</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="i18n[currentLang].nameHeader"></h3></div>
                                        <div class="space-y-3 text-sm">
                                            <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].typoLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.nameCorrection?.typoAllowance || 'N/A'"></span></div>
                                            <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].legalLabel"></span><span class="font-medium text-slate-200" x-text="selectedAirline.nameCorrection?.legalChange || 'N/A'"></span></div>
                                            <div class="flex justify-between pb-0.5"><span class="text-slate-400" x-text="i18n[currentLang].nameFeeLabel"></span><span class="font-medium text-amber-400 font-semibold" x-text="selectedAirline.nameCorrection?.penaltyFee || 'N/A'"></span></div>
                                        </div>
                                    </div>
                                    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                        <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">⌨️</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="i18n[currentLang].gdsCmdHeader"></h3></div>
                                        <div class="space-y-3 text-sm">
                                            <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400" x-text="i18n[currentLang].passportLabel"></span><span class="font-medium text-slate-200 font-bold" x-text="selectedAirline.nameCorrection?.passportMatch ? i18n[currentLang].yes : i18n[currentLang].no"></span></div>
                                            <template x-if="viewMode === 'agent'">
                                                <div class="space-y-3 pt-1">
                                                    <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].gdsReissueLabel"></span><span class="font-mono text-[11px] font-bold text-emerald-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.nameCorrection?.gdsCommand || 'N/A'"></span></div>
                                                    <div class="flex justify-between pb-0.5"><span class="text-slate-400 text-xs" x-text="i18n[currentLang].osiNameLabel"></span><span class="font-mono text-[11px] font-bold text-sky-400 bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.nameCorrection?.osiString || 'N/A'"></span></div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            
                        </div>
                    </template>
                    <template x-if="!selectedAirline">
                        <div class="bg-slate-900 border border-dashed border-slate-800 rounded-xl h-72 flex flex-col items-center justify-center text-slate-500 shadow-xl"><span class="text-4xl mb-3">✈️</span><span class="font-semibold text-slate-400" x-text="i18n[currentLang].noSelection"></span></div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
