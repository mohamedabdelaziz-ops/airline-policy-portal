<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruption Desk - Airline Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-sky-500 selection:text-white">

    <div x-data="{
        searchQuery: '',
        filterSameCabin: false,
        filterSameClass: false,
        filterOalAllowed: false,
        filterRefundAllowed: false,
        selectedAirline: null,
        isAdminMode: false,
        adminPasswordInput: '',
        isEditing: false,
        airlines: [],
        
        // Admin Form Working State
        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-26',
            scheduleChange: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: false, sameBookingClass: false, lowestAvailableClass: '', oalAllowed: false, ticketReissue: false, waiverRequired: false },
            refundPolicy: { refundAllowed: false, refundThreshold: '', cancellationRefund: false, majorScheduleChangeRefund: false, penalty: 'None', waiverRequired: false }
        },

        init() {
            this.airlines = [
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '✈️', lastUpdated: '2026-06-26',
                    scheduleChange: { minorChange: 'Less than 60 minutes', majorChange: '60 minutes or more', threshold: '60 minutes', travelWindow: '+/-7 days', sameCabin: true, sameBookingClass: true, lowestAvailableClass: 'Same RBD Preferred', oalAllowed: false, ticketReissue: true, waiverRequired: true },
                    refundPolicy: { refundAllowed: true, refundThreshold: '120 minutes', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'None', waiverRequired: true }
                },
                {
                    airlineName: 'Delta Air Lines', iata: 'DL', icao: 'DAL', logo: '📐', lastUpdated: '2026-06-20',
                    scheduleChange: { minorChange: 'Less than 60 minutes', majorChange: '60 minutes or more', threshold: '60 minutes', travelWindow: '+/-2 days', sameCabin: true, sameBookingClass: true, lowestAvailableClass: 'Main Cabin Lowest', oalAllowed: true, ticketReissue: true, waiverRequired: false },
                    refundPolicy: { refundAllowed: true, refundThreshold: '180 minutes', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'None', waiverRequired: false }
                }
            ];
            this.selectedAirline = this.airlines[0];
        },
        get filteredAirlines() {
            return this.airlines.filter(airline => {
                const matchesSearch = airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                                      airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                                      airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
                return matchesSearch && (!this.filterSameCabin || airline.scheduleChange.sameCabin) && (!this.filterSameClass || airline.scheduleChange.sameBookingClass) && (!this.filterOalAllowed || airline.scheduleChange.oalAllowed) && (!this.filterRefundAllowed || airline.refundPolicy.refundAllowed);
            });
        },
        verifyAdmin() {
            if(this.adminPasswordInput === 'admin123') {
                this.isAdminMode = true;
                this.adminPasswordInput = '';
            } else { alert('Access Denied: Incorrect Security Token'); }
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-26',
                scheduleChange: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: false, sameBookingClass: false, lowestAvailableClass: '', oalAllowed: false, ticketReissue: false, waiverRequired: false },
                refundPolicy: { refundAllowed: false, refundThreshold: '', cancellationRefund: false, majorScheduleChangeRefund: false, penalty: 'None', waiverRequired: false }
            };
            this.isEditing = false;
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline Name and IATA Code are required.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            this.formAirline.icao = this.formAirline.icao.toUpperCase();
            
            if(this.isEditing) {
                const idx = this.airlines.findIndex(a => a.iata === this.formAirline.iata);
                if(idx !== -1) this.airlines[idx] = JSON.parse(JSON.stringify(this.formAirline));
            } else {
                this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            }
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.resetForm();
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            this.isEditing = true;
        },
        deleteAirline(iata) {
            if(confirm('Are you absolute sure you want to completely erase this carrier database file?')) {
                this.airlines = this.airlines.filter(a => a.iata !== iata);
                this.selectedAirline = this.airlines[0] || null;
            }
        }
    }" class="min-h-screen flex flex-col">

        <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">DISRUPTION DESK</h1>
                    <p class="text-xs text-slate-400 font-medium">Airline Schedule Change & Refund Reference Hub</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div x-show="!isAdminMode" class="flex items-center space-x-2 bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-3 py-1.5 rounded text-white w-28 placeholder-slate-600 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-3 py-1.5 rounded transition uppercase tracking-wider">Auth</button>
                </div>
                <div x-show="isAdminMode" class="flex items-center space-x-2">
                    <span class="text-xs font-mono px-2 py-1 rounded bg-amber-500/10 border border-amber-500/30 text-amber-400 font-bold">🛠️ ADMIN MASTER</span>
                    <button @click="isAdminMode = false; resetForm()" class="text-xs border border-slate-700 bg-slate-800 hover:bg-rose-600 text-white px-3 py-1 rounded transition">Lock</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Search Fleet Index</label>
                        <input type="text" placeholder="Carrier, IATA, ICAO..." x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white placeholder-slate-500 transition text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                    
                    <div class="space-y-2 pt-2 border-t border-slate-800 text-sm text-slate-300">
                        <label class="flex items-center space-x-3 cursor-pointer hover:text-white"><input type="checkbox" x-model="filterSameCabin" class="rounded bg-slate-950 border-slate-700 text-sky-500 w-4 h-4" /><span>Same Cabin</span></label>
                        <label class="flex items-center space-x-3 cursor-pointer hover:text-white"><input type="checkbox" x-model="filterSameClass" class="rounded bg-slate-950 border-slate-700 text-sky-500 w-4 h-4" /><span>Same RBD</span></label>
                        <label class="flex items-center space-x-3 cursor-pointer hover:text-white"><input type="checkbox" x-model="filterOalAllowed" class="rounded bg-slate-950 border-slate-700 text-sky-500 w-4 h-4" /><span>OAL Allowed</span></label>
                        <label class="flex items-center space-x-3 cursor-pointer hover:text-white"><input type="checkbox" x-model="filterRefundAllowed" class="rounded bg-slate-950 border-slate-700 text-sky-500 w-4 h-4" /><span>Refund Permitted</span></label>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider">Airlines Index (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <div class="group flex items-center space-x-1.5">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center transition">
                                    <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode">
                                    <div class="flex flex-col space-y-1">
                                        <button @click="editAirline(airline)" class="p-1 bg-slate-800 hover:bg-amber-600 text-[10px] rounded text-amber-400 hover:text-white">✏️</button>
                                        <button @click="deleteAirline(airline.iata)" class="p-1 bg-slate-800 hover:bg-rose-600 text-[10px] rounded text-rose-400 hover:text-white">❌</button>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <template x-if="isAdminMode">
                    <div class="bg-slate-900 border-2 border-dashed border-amber-500/30 rounded-xl p-6 shadow-2xl space-y-6">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                            <h3 class="font-bold text-base text-amber-400 uppercase tracking-wider" x-text="isEditing ? 'Modify Carrier Profiles Matrix' : 'Inject New Fleet Policy Ruleset' "></h3>
                            <button @click="resetForm()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white px-3 py-1 rounded">Reset Form</button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
                            <div><label class="block text-xs font-semibold text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white focus:outline-none" /></div>
                            <div><label class="block text-xs font-semibold text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" placeholder="e.g. AC" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white disabled:opacity-50 focus:outline-none" /></div>
                            <div><label class="block text-xs font-semibold text-slate-400 mb-1">ICAO Code</label><input type="text" x-model="formAirline.icao" placeholder="e.g. ACA" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white focus:outline-none" /></div>
                            <div><label class="block text-xs font-semibold text-slate-400 mb-1">Logo Sign / Emoji</label><input type="text" x-model="formAirline.logo" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white text-center focus:outline-none" /></div>
                        </div>

                        <div class="border-t border-slate-800/80 pt-4 space-y-4">
                            <h4 class="text-xs font-bold text-sky-400 uppercase tracking-widest">Disruption Configs</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Minor Change Definition</label><input type="text" x-model="formAirline.scheduleChange.minorChange" placeholder="e.g. <60 min" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Major Change Definition</label><input type="text" x-model="formAirline.scheduleChange.majorChange" placeholder="e.g. >=60 min" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Threshold Primary Trigger</label><input type="text" x-model="formAirline.scheduleChange.threshold" placeholder="e.g. 60 minutes" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Allowed Window Allowed (+/- days)</label><input type="text" x-model="formAirline.scheduleChange.travelWindow" placeholder="e.g. +/-7 days" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Inventory Fallback Target</label><input type="text" x-model="formAirline.scheduleChange.lowestAvailableClass" placeholder="e.g. Same RBD Preferred" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-xs font-medium text-slate-300 pt-1">
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.sameCabin" class="rounded bg-slate-950 text-sky-500" /><span>Same Cabin Req</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.sameBookingClass" class="rounded bg-slate-950 text-sky-500" /><span>Same RBD Req</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.oalAllowed" class="rounded bg-slate-950 text-sky-500" /><span>OAL Allowed</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.ticketReissue" class="rounded bg-slate-950 text-sky-500" /><span>Reissue Required</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.scheduleChange.waiverRequired" class="rounded bg-slate-950 text-sky-500" /><span>Waiver Code Req</span></label>
                            </div>
                        </div>

                        <div class="border-t border-slate-800/80 pt-4 space-y-4">
                            <h4 class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Refund Parameters</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Significant Refund Threshold</label><input type="text" x-model="formAirline.refundPolicy.refundThreshold" placeholder="e.g. 120 minutes" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Involuntary Admin Fee / Penalties</label><input type="text" x-model="formAirline.refundPolicy.penalty" placeholder="e.g. None" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs font-medium text-slate-300 pt-1">
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.refundAllowed" class="rounded bg-slate-950 text-emerald-500" /><span>Refund Allowed</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.cancellationRefund" class="rounded bg-slate-950 text-emerald-500" /><span>Cancellation Safe</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.majorScheduleChangeRefund" class="rounded bg-slate-950 text-emerald-500" /><span>SKD CHG Protected</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" x-model="formAirline.refundPolicy.waiverRequired" class="rounded bg-slate-950 text-emerald-500" /><span>Waiver Code Req</span></label>
                            </div>
                        </div>

                        <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase text-xs tracking-wider rounded-lg shadow-lg hover:from-amber-400 hover:to-orange-500 transition">Save Policy Data Object</button>
                    </div>
                </template>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            <div class="bg-gradient-to-r from-slate-900 via-slate-900 to-indigo-950/40 p-6 rounded-xl border border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl">
                                <div class="flex items-center space-x-4">
                                    <div class="text-4xl bg-slate-950 p-3 rounded-xl border border-slate-700 shadow-inner" x-text="selectedAirline.logo"></div>
                                    <div>
                                        <h2 class="text-2xl font-bold text-white tracking-tight" x-text="selectedAirline.airlineName"></h2>
                                        <p class="text-xs text-slate-400 mt-0.5">GDS Fleet Identification Codes: IATA: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.iata"></span> | ICAO: <span class="text-sky-400 font-mono font-bold" x-text="selectedAirline.icao"></span></p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] uppercase font-bold tracking-widest text-slate-500 block">Database Profile Valid</span>
                                    <span class="text-sm font-mono text-indigo-300 font-medium" x-text="selectedAirline.lastUpdated"></span>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">SKD CHG Trigger</span><span class="text-base font-bold text-amber-400 mt-1 block" x-text="selectedAirline.scheduleChange.threshold || 'N/A'"></span></div>
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">Travel Window</span><span class="text-base font-bold text-sky-400 mt-1 block" x-text="selectedAirline.scheduleChange.travelWindow || 'N/A'"></span></div>
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">OAL Rebooking</span><span :class="selectedAirline.scheduleChange.oalAllowed ? 'text-emerald-400' : 'text-rose-400'" class="text-base font-bold mt-1 block" x-text="selectedAirline.scheduleChange.oalAllowed ? 'ALLOWED' : 'PROHIBITED'"></span></div>
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">Refund Eligibility</span><span :class="selectedAirline.refundPolicy.refundAllowed ? 'text-emerald-400' : 'text-rose-400'" class="text-base font-bold mt-1 block" x-text="selectedAirline.refundPolicy.refundAllowed ? 'YES' : 'NO'"></span></div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3">
                                        <span class="text-lg">🔄</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider">Schedule Change Framework</h3>
                                    </div>
                                    <div class="space-y-3 text-sm">
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Minor Change Profile</span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.minorChange || 'None Defined'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Major Change Profile</span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.majorChange || 'None Defined'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Cabin Matching Rules</span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.sameCabin ? 'Strict Balance Required' : 'Alternative Class Permitted'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Booking Class (RBD)</span><span class="font-medium text-slate-200" x-text="selectedAirline.scheduleChange.sameBookingClass ? 'Exact RBD Match Required' : 'Lowest Class Allowed'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Inventory Fallback Target</span><span class="font-medium text-indigo-300 font-mono text-xs bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.scheduleChange.lowestAvailableClass || 'N/A'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Ticket Reissue Required</span><span :class="selectedAirline.scheduleChange.ticketReissue ? 'text-amber-400' : 'text-slate-400'" class="font-semibold" x-text="selectedAirline.scheduleChange.ticketReissue ? 'YES - Reissue Needed' : 'NO - Authority Waiver Only'"></span></div>
                                        <div class="flex justify-between pb-0.5"><span class="text-slate-400">GDS Endorsement Waiver</span><span :class="selectedAirline.scheduleChange.waiverRequired ? 'text-amber-400' : 'text-emerald-400'" class="font-semibold" x-text="selectedAirline.scheduleChange.waiverRequired ? 'Mandatory Waiver Code' : 'Automated Verification Code'"></span></div>
                                    </div>
                                </div>

                                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3">
                                        <span class="text-lg">💰</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">Refund Protocols</h3>
                                    </div>
                                    <div class="space-y-3 text-sm">
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Involuntary Cancellation Refund</span><span class="font-medium text-emerald-400" x-text="selectedAirline.refundPolicy.cancellationRefund ? 'Full Refund Authorized' : 'Credit Shell Voucher'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Significant Change Trigger</span><span class="font-medium text-slate-200" x-text="selectedAirline.refundPolicy.refundThreshold || 'N/A'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Major Change Protection</span><span class="font-medium text-slate-200" x-text="selectedAirline.refundPolicy.majorScheduleChangeRefund ? 'Fully Covered' : 'Subject to Assessment'"></span></div>
                                        <div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span class="text-slate-400">Involuntary Admin Penalties</span><span class="font-medium text-slate-200 font-mono text-xs bg-slate-950 px-2 py-0.5 rounded border border-slate-800" x-text="selectedAirline.refundPolicy.penalty || 'None'"></span></div>
                                        <div class="flex justify-between pb-0.5"><span class="text-slate-400">GDS Refund Waiver Injection</span><span :class="selectedAirline.refundPolicy.waiverRequired ? 'text-amber-400' : 'text-emerald-400'" class="font-semibold" x-text="selectedAirline.refundPolicy.waiverRequired ? 'Waiver Input Mandatory' : 'System Validation Exempt'"></span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template x-if="!selectedAirline">
                        <div class="bg-slate-900 border border-dashed border-slate-800 rounded-xl h-72 flex flex-col items-center justify-center text-slate-500 shadow-xl"><span class="text-4xl mb-3">✈️</span><span class="font-semibold text-slate-400">No Carrier Selection Detected</span></div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
