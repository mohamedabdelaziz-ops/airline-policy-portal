        get estOutput() {
            if(!this.zuluInput) return '--:-- --';
            try {
                let cleanTime = this.zuluInput.trim().replace(' ', '');
                let parts = cleanTime.split(':');
                if(parts.length !== 2) return '--:-- --';
                let hours = parseInt(parts[0], 10);
                let minutes = parseInt(parts[1], 10);
                if(isNaN(hours) || hours < 0 || hours > 23 || isNaN(minutes) || minutes < 0 || minutes > 59) return '--:-- --';
                
                let estHours = hours - 5;
                if (estHours < 0) estHours += 24;
                const ampm = estHours >= 12 ? 'PM' : 'AM';
                
                estHours = estHours % 12;
                if (estHours === 0) estHours = 12; 
                
                return String(estHours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ' ' + ampm;
            } catch(e) { return '--:-- --'; }
        },

        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-30',
            policyWebLink: '', policyPdfLink: '',
            threshold: '', travelWindow: '', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
            pureSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
            pureName: { fields: [] },
            oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
            oalName: { fields: [] }
        },

        isInternalField(label) {
            if (!label) return false;
            const lowerLabel = label.toLowerCase();
            return lowerLabel.includes('gds') || lowerLabel.includes('command') || lowerLabel.includes('osi') || lowerLabel.includes('tour code') || lowerLabel.includes('contact') || lowerLabel.includes('email') || lowerLabel.includes('phone') || lowerLabel.includes('infrastructure') || lowerLabel.includes('technical') || lowerLabel.includes('reissue / swap') || lowerLabel.includes('workaround');
        },

        generateEmptyStructure() {
            return {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-30',
                policyWebLink: '', policyPdfLink: '',
                threshold: 'N/A', travelWindow: 'N/A', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                pureSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
                pureName: { fields: [] },
                oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
                oalName: { fields: [] }
            };
        },

        forceResetDatabase() {
            if(confirm('Wipe local browser cache data and reload default configurations?')) {
                localStorage.removeItem('disruption_desk_fleet_data');
                this.loadDefaults();
                alert('Database completely reset!');
            }
        },

        loadDefaults() {
            this.airlines = [
                {
                    airlineName: 'Delta Air Lines', iata: 'DL', icao: 'DAL', logo: '📐', lastUpdated: '2026-06-30',
                    policyWebLink: 'https://pro.delta.com', policyPdfLink: '',
                    threshold: '180', travelWindow: '-/+2 days', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pureSkchg: {
                        normalSkchg: [
                            { label: 'MINOR SC', value: 'less than 180 Min', allowed: true },
                            { label: 'QUALIFICATIONS', value: '➢ For tickets issued after October 28, 2024, if 180 minutes or more for domestic or 360 minutes or more for international itineraries.', allowed: true },
                            { label: 'REBOOKING OPTIONS FOR ACCEPTABLE SCHEDULE CHANGE OR IRREGULAR OPERATIONS:', value: 'If the schedule change is acceptable and the ticket has been revalidated, you must enter the following OSI message in the PNR to indicate the customer\'s acceptance', allowed: true },
                            { label: 'ACCEPTANCE OSI', value: 'OS DL ACCEPT DUE TO DL INVOL', allowed: true }
                        ],
                        iropSkchg: [], normalRefund: [], iropRefund: []
                    },
                    pureName: { fields: [] }, oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }, oalName: { fields: [] }
                },
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '🇨🇦', lastUpdated: '2026-06-30',
                    policyWebLink: 'https://www.aircanada.com/agency', policyPdfLink: '',
                    threshold: '180', travelWindow: '-/+30 days', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pureSkchg: {
                        normalSkchg: [
                            { label: 'MINOR CHANGE PROFILE', value: 'Less than 60 minutes time deviation.', allowed: true },
                            { label: 'CABIN MATCHING RULES', value: 'Strict Cabin Balance Required.', allowed: false },
                            { label: 'INVENTORY FALLBACK TARGET', value: 'Original booking class preferred; up to Y class maximum fallback.', allowed: true }
                        ],
                        iropSkchg: [
                            { label: 'MAJOR CHANGE PROFILE', value: '60 minutes or more / Operating carrier change / Stop added.', allowed: true }
                        ],
                        normalRefund: [], iropRefund: []
                    },
                    pureName: { fields: [] }, oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }, oalName: { fields: [] }
                }
            ];
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
            this.selectedAirline = this.airlines[0];
        },

        init() {
            const localSavedData = localStorage.getItem('disruption_desk_fleet_data');
            if (localSavedData) {
                try {
                    const parsed = JSON.parse(localSavedData);
                    if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].pureSkchg) {
                        this.airlines = parsed;
                        this.selectedAirline = this.airlines[0];
                        return;
                    }
                } catch(e) { console.error('Corrupted cache data.'); }
            }
            this.loadDefaults();
        },

        addCustomField(pillar) {
            if(!this.newCustomLabel) return alert('Please enter a Field Title Name');
            const targetPillarKey = pillar === 'pure_skchg' ? 'pureSkchg' : pillar === 'pure_name' ? 'pureName' : pillar === 'oal_skchg' ? 'oalSkchg' : 'oalName';
            
            if(!this.formAirline[targetPillarKey]) {
                if(pillar.includes('name')) { this.formAirline[targetPillarKey] = { fields: [] }; }
                else { this.formAirline[targetPillarKey] = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }; }
            }

            if(pillar.includes('skchg')) {
                const arrayKey = this.targetConditionType + (this.targetColumnType === 'skchg' ? 'Skchg' : 'Refund');
                if(!this.formAirline[targetPillarKey][arrayKey]) this.formAirline[targetPillarKey][arrayKey] = [];
                this.formAirline[targetPillarKey][arrayKey].push({
                    label: this.newCustomLabel.toUpperCase(), value: this.newCustomValue, allowed: this.newCustomStatus
                });
            } else {
                if(!this.formAirline[targetPillarKey].fields) this.formAirline[targetPillarKey].fields = [];
                this.formAirline[targetPillarKey].fields.push({
                    label: this.newCustomLabel.toUpperCase(), value: this.newCustomValue, allowed: this.newCustomStatus
                });
            }
            this.newCustomLabel = ''; this.newCustomValue = ''; this.newCustomStatus = true;
        },

        removeCustomField(pillar, subType, idx) {
            const targetPillarKey = pillar === 'pure_skchg' ? 'pureSkchg' : pillar === 'pure_name' ? 'pureName' : pillar === 'oal_skchg' ? 'oalSkchg' : 'oalName';
            if(pillar.includes('skchg')) {
                this.formAirline[targetPillarKey][subType].splice(idx, 1);
            } else {
                this.formAirline[targetPillarKey].fields.splice(idx, 1);
            }
        },

        saveAirline() {
            if(!this.formAirline.airlineName) return alert('Airline Name is required to save.');
            
            let freshBase = this.generateEmptyStructure();
            
            freshBase.airlineName = this.formAirline.airlineName;
            freshBase.iata = this.formAirline.iata ? this.formAirline.iata.toUpperCase() : this.formAirline.airlineName.substring(0,2).toUpperCase() + Math.floor(Math.random() * 100);
            freshBase.icao = this.formAirline.icao ? this.formAirline.icao.toUpperCase() : '';
            freshBase.logo = this.formAirline.logo || '✈️';
            freshBase.policyWebLink = this.formAirline.policyWebLink || '';
            freshBase.policyPdfLink = this.formAirline.policyPdfLink || '';
            freshBase.threshold = this.formAirline.threshold || 'N/A';
            freshBase.travelWindow = this.formAirline.travelWindow || 'N/A';
            freshBase.oalRebookingVal = this.formAirline.oalRebookingVal || 'ALLOWED';
            freshBase.refundEligVal = this.formAirline.refundEligVal || 'YES';

            if(this.formAirline.pureSkchg) {
                if(this.formAirline.pureSkchg.normalSkchg) freshBase.pureSkchg.normalSkchg = JSON.parse(JSON.stringify(this.formAirline.pureSkchg.normalSkchg));
                if(this.formAirline.pureSkchg.iropSkchg) freshBase.pureSkchg.iropSkchg = JSON.parse(JSON.stringify(this.formAirline.pureSkchg.iropSkchg));
                if(this.formAirline.pureSkchg.normalRefund) freshBase.pureSkchg.normalRefund = JSON.parse(JSON.stringify(this.formAirline.pureSkchg.normalRefund));
                if(this.formAirline.pureSkchg.iropRefund) freshBase.pureSkchg.iropRefund = JSON.parse(JSON.stringify(this.formAirline.pureSkchg.iropRefund));
            }
            if(this.formAirline.pureName && this.formAirline.pureName.fields) freshBase.pureName.fields = JSON.parse(JSON.stringify(this.formAirline.pureName.fields));
            
            if(this.formAirline.oalSkchg) {
                if(this.formAirline.oalSkchg.normalSkchg) freshBase.oalSkchg.normalSkchg = JSON.parse(JSON.stringify(this.formAirline.oalSkchg.normalSkchg));
                if(this.formAirline.oalSkchg.iropSkchg) freshBase.oalSkchg.iropSkchg = JSON.parse(JSON.stringify(this.formAirline.oalSkchg.iropSkchg));
                if(this.formAirline.oalSkchg.normalRefund) freshBase.oalSkchg.normalRefund = JSON.parse(JSON.stringify(this.formAirline.oalSkchg.normalRefund));
                if(this.formAirline.oalSkchg.iropRefund) freshBase.oalSkchg.iropRefund = JSON.parse(JSON.stringify(this.formAirline.oalSkchg.iropRefund));
            }
            if(this.formAirline.oalName && this.formAirline.oalName.fields) freshBase.oalName.fields = JSON.parse(JSON.stringify(this.formAirline.oalName.fields));

            const idx = this.airlines.findIndex(a => a.iata === freshBase.iata);
            if(idx !== -1) {
                this.airlines[idx] = freshBase;
            } else {
                this.airlines.push(freshBase);
            }
            
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
            this.selectedAirline = this.airlines.find(a => a.iata === freshBase.iata);
            this.isEditing = false; this.isAdminMode = false; this.resetForm();
        },

        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            if(!this.formAirline.pureSkchg) this.formAirline.pureSkchg = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] };
            if(!this.formAirline.pureName) this.formAirline.pureName = { fields: [] };
            if(!this.formAirline.oalSkchg) this.formAirline.oalSkchg = { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] };
            if(!this.formAirline.oalName) this.formAirline.oalName = { fields: [] };
            this.isEditing = true; this.isAdminMode = true;
        },

        prepareNewAirlineForm() {
            this.formAirline = this.generateEmptyStructure();
            this.isEditing = false;
            this.isAdminMode = true;
        },

        verifyAdmin() {
            let cleanPasswordInput = this.adminPasswordInput.trim().toLowerCase();
            if(cleanPasswordInput === 'admin123') { 
                this.isAdminMode = true; 
                this.adminPasswordInput = ''; 
            } else { alert('Access Denied'); }
        },

        resetForm() {
            this.formAirline = this.generateEmptyStructure();
            this.isEditing = false;
        }
    }" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased text-xs">

                </div>
            </div>

                </div>

                                        </a>

                                                <template x-for="(field, index) in selectedAirline[activePolicy === 'pure_skchg' ? 'pureSkchg' : 'oalSkchg']?.iropRefund" :key="'live-refund-irop-'+index">

                        <div class="bg-slate-900 border border-slate-800 p-12 text-center rounded-xl font-medium text-slate-500 uppercase tracking-widest shadow-inner" x-text="i18n[currentLang].noSelection"></div>
                    </template>
                </div>

            </div>
        </main>
    </div>
