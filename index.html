                },
                {
                    airlineName: 'WestJet Airlines', iata: 'WS', icao: 'WJA', logo: '🍁', lastUpdated: '2026-06-26',
                    scheduleChange: { minorChange: 'Less than 181 minutes', majorChange: '181 minutes or more (3+ Hours)', threshold: '181 minutes', travelWindow: '+/-2 days', sameCabin: true, sameBookingClass: false, lowestAvailableClass: 'Next highest up to Y (Eco) / W (Prem) / J (Biz)', oalAllowed: true, ticketReissue: true, waiverRequired: true, endorsementCode: 'SKCHG', geoAllowance: 'Within 320 km / 200 miles (e.g. YVR/YXX)' },
                    refundPolicy: { refundAllowed: true, refundThreshold: '181 minutes', cancellationRefund: true, majorScheduleChangeRefund: true, penalty: 'Taxes L8/DO non-refundable for PUJ/POP/AZS/LRM', waiverRequired: true, refundWaiverCode: 'Q21SKDRF22', osiTourCode: 'None Specified' },
                    nameCorrection: { typoAllowance: 'First or middle name up to 3 chars', legalChange: 'Marriage/Divorce certificates accepted', passportMatch: true, penaltyFee: 'UltraBasic excluded, others free for typos', gdsCommand: 'CHNE/GDS SWAP PERMITTED', osiString: 'OS WS TYPO CORR' }
                }
            ];
            this.selectedAirline = this.airlines[2]; 
        },
        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        },
        verifyAdmin() {
            if(this.adminPasswordInput === 'admin123') {
                this.isAdminMode = true;
                this.adminPasswordInput = '';
            } else { alert('Access Denied: Incorrect Security Token'); }
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-26',
                scheduleChange: { minorChange: '', majorChange: '', threshold: '', travelWindow: '', sameCabin: false, sameBookingClass: false, lowestAvailableClass: '', oalAllowed: false, ticketReissue: false, waiverRequired: false, endorsementCode: '', geoAllowance: '' },
                refundPolicy: { refundAllowed: false, refundThreshold: '', cancellationRefund: false, majorScheduleChangeRefund: false, penalty: 'None', waiverRequired: false, refundWaiverCode: '', osiTourCode: '' },
                nameCorrection: { typoAllowance: '', legalChange: '', passportMatch: false, penaltyFee: '', gdsCommand: '', osiString: '' }
            };
            this.isEditing = false;
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline Name and IATA Code are required.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            this.formAirline.icao = this.formAirline.icao.toUpperCase();
            
            if(this.isEditing) {
                const idx = this.airlines.findIndex(a => a.iata === this.formAirline.iata);
                if(idx !== -1) this.airlines[idx] = JSON.parse(JSON.stringify(this.formAirline));
            } else {
                this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            }
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.resetForm();
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            this.isEditing = true;
            this.isAdminMode = true;
        }

                </div>

                    </div>
                    <div x-show="isAdminMode" class="flex items-center space-x-2">
                        <span class="text-[10px] font-mono px-2 py-1 rounded bg-amber-500/10 border border-amber-500/30 text-amber-400 font-bold tracking-wider">🛠️ MASTER</span>

                    </div>
                </div>
            </div>

                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">

                        <template x-for="airline in filteredAirlines" :key="airline.iata">
